<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FiberOps — Gestão de Rede FTTH</title>

  <script>
    window.WORKER_URL = "https://ftth-pwa.lupiing37.workers.dev";
    window.__BUILD_ID__ = "FTTH-2026-02-25-MOBILE-GPS-REGISTRO-STEP3-AUTOSYNC";
window.PROJECT_CENTER = [-41.9780943, -22.2587813]; // [lng, lat]
    window.PROJECT_ZOOM = 13.5;

  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2e;
      --muted:#9ca3af;
      --border:#1f2a44;
      --ok:#22c55e;
      --warn:#f59e0b;
      --blue:#3b82f6;
      --purple:#a855f7;
      --orange:#f97316;
      --radius:16px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:#fff;height:100%;overflow:hidden;}
    html{height:100%;overflow:hidden;}
    #appShell{position:fixed;inset:0;display:flex;flex-direction:column;}
    header{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:calc(10px + var(--safe-top)) 12px 10px;
      background:var(--panel);
      flex-shrink:0;
      z-index:5;
    }
    .left{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .badge{font-size:12px;color:var(--muted);max-width:65vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .chip{
      display:flex;gap:6px;align-items:center;
      font-size:12px;color:#cbd5e1;background:var(--bg);
      border:1px solid var(--border);border-radius:999px;padding:8px 12px;
      min-height:40px;
    }
    .chip input{transform:scale(1.2); accent-color: var(--ok);}
    #map{width:100%;flex:1;min-height:0;}

    /* Floating buttons (mobile-first) */
    .fabCol{
      position:fixed; right:14px; bottom:calc(14px + var(--safe-bottom)); z-index:6;
      display:flex; flex-direction:column; gap:10px;
    }
    .fab{
      width:52px;height:52px;border-radius:999px;border:1px solid rgba(255,255,255,.12);
      background:rgba(17,26,46,.92); color:#fff; display:flex; align-items:center; justify-content:center;
      box-shadow: 0 10px 25px rgba(0,0,0,.35);
      backdrop-filter: blur(6px);
      -webkit-tap-highlight-color: transparent;
      user-select:none;
      font-size:20px;
    }
    .fab:active{transform:scale(0.98)}
    .fabSmall{width:44px;height:44px;font-size:18px}
    #btnSatellite.sat-on{background:rgba(59,130,246,.35)!important;border-color:#3b82f6!important;box-shadow:0 0 12px rgba(59,130,246,.45)}

    /* Bottom sheet */
    .sheetBackdrop{
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      z-index:10; display:none;
    }
    .sheet{
      position:fixed; left:0; right:0; bottom:0;
      z-index:11; display:none;
      background:rgba(17,26,46,.98); border-top:1px solid rgba(255,255,255,.10);
      border-radius: 20px 20px 0 0;
      padding:12px 12px calc(12px + var(--safe-bottom));
      max-height:78vh; overflow:auto;
      transform: translateY(100%);
      transition: transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94);
      will-change: transform;
    }
    .sheet.sheet-open {
      transform: translateY(0);
    }
    .sheetHandle{width:44px;height:5px;border-radius:99px;background:rgba(255,255,255,.25);margin:6px auto 10px}
    .sheetTitle{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .sheetTitle h3{margin:0;font-size:16px}
    .sheetTitle .x{font-size:22px;line-height:1; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(0,0,0,.15)}
    .kv{font-size:12px;color:var(--muted);margin:6px 0 12px}
    .btnRow{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      padding:12px 14px; border-radius:14px; border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.15); color:#fff; font-weight:700; min-height:44px;
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
    }
    .btnPrimary{background:var(--ok); color:#001b09; border:none;}
    .btnWarn{background:var(--warn); color:#1b1200; border:none;}
    .btnBlue{background:var(--blue); color:#00112a; border:none;}
    .btn:active{transform:scale(0.99)}
    .field{display:flex;flex-direction:column;gap:6px;margin:10px 0}
    .field label{font-size:12px;color:#cbd5e1}
    .field input,.field select,.field textarea{
      border-radius:14px; border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.22); color:#fff; padding:12px 12px;
      font-size:15px; outline:none;
    }
    .field textarea{min-height:84px; resize:vertical}
    .hint{font-size:12px;color:var(--muted);margin-top:6px}

    /* Admin modal fade-in */
    #adminModalBackdrop {
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
      /* Garante que o modal nunca exceda a viewport */
      align-items: center;
      justify-content: center;
      padding: 12px;
      box-sizing: border-box;
    }
    #adminModalBackdrop.modal-open {
      opacity: 1;
      pointer-events: all;
    }
    #adminModalBackdrop > div {
      transform: scale(0.97) translateY(8px);
      transition: transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94);
      max-height: calc(100dvh - 24px) !important;
      display: flex !important;
      flex-direction: column !important;
      width: min(600px, 100%) !important;
    }
    #adminModalBackdrop.modal-open > div {
      transform: scale(1) translateY(0);
    }
    a{color:#93c5fd}

    /* MapLibre popup readability on mobile */
    .maplibregl-popup-content{
      border-radius:14px !important;
      padding:12px 12px !important;
      font-size:14px !important;
      line-height:1.35 !important;
      max-width: 80vw !important;
    }
  
    /* ── Login overlay ──────────────────────────────────────────────────────── */
    .login-screen{
      position:fixed; inset:0;
      display:none;
      align-items:center; justify-content:center;
      background: rgba(4,8,20,.92);
      backdrop-filter: blur(14px);
      z-index:99999;
      padding:24px 16px;
    }
    .login-screen.show{ display:flex; }

    /* Grid de fibra no fundo */
    .login-screen::before{
      content:'';
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(34,197,94,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,197,94,.035) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 100%);
      pointer-events:none;
    }
    /* Glow verde central */
    .login-screen::after{
      content:'';
      position:absolute;
      width:560px; height:560px;
      background: radial-gradient(circle, rgba(34,197,94,.07) 0%, transparent 65%);
      top:50%; left:50%; transform:translate(-50%,-50%);
      pointer-events:none;
    }

    .login-card{
      position:relative; z-index:1;
      width:min(400px, 100%);
      border-radius:22px;
      padding:34px 28px 28px;
      background: linear-gradient(160deg, rgba(13,22,45,.97), rgba(6,12,26,.99));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        0 0 0 1px rgba(34,197,94,.06),
        0 32px 80px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.06);
      animation: loginCardIn .4s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes loginCardIn{
      from{ opacity:0; transform:translateY(16px) scale(.98); }
      to  { opacity:1; transform:none; }
    }
    /* Linha brilhante no topo */
    .login-card::before{
      content:'';
      position:absolute;
      top:0; left:18%; right:18%; height:1px;
      background:linear-gradient(90deg, transparent, rgba(34,197,94,.5), transparent);
      border-radius:999px;
    }

    /* Logo */
    .login-logo{
      display:flex; align-items:center; gap:10px;
      margin-bottom:26px;
    }
    .login-logo-icon{
      width:40px; height:40px;
      background:rgba(34,197,94,.12);
      border:1px solid rgba(34,197,94,.22);
      border-radius:11px;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; flex-shrink:0;
    }
    .login-logo-title{ font-size:16px; font-weight:800; color:#fff; letter-spacing:-.2px; }
    .login-logo-sub  { font-size:11px; color:#64748b; margin-top:1px; }

    /* Campo */
    .login-field{ margin-bottom:13px; }
    .login-label{
      display:block; font-size:11.5px; font-weight:600;
      color:#94a3b8; letter-spacing:.03em; margin-bottom:6px;
    }
    .login-input-wrap{ position:relative; display:flex; align-items:center; }
    .login-input-ico{
      position:absolute; left:12px;
      font-size:14px; opacity:.4; pointer-events:none;
    }
    .login-input{
      width:100%;
      padding:12px 12px 12px 36px;
      font-size:14px; color:#e2e8f0;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.09);
      border-radius:12px;
      outline:none;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }
    .login-input::placeholder{ color:#475569; }
    .login-input:focus{
      border-color:rgba(34,197,94,.5);
      background:rgba(34,197,94,.04);
      box-shadow:0 0 0 3px rgba(34,197,94,.12);
    }

    /* Botão principal */
    .login-btn{
      margin-top:6px; width:100%;
      padding:13px; border:none; border-radius:13px;
      background:linear-gradient(180deg,#22c55e,#16a34a);
      color:#042b12; font-size:14px; font-weight:900;
      cursor:pointer; letter-spacing:.02em;
      box-shadow:0 6px 24px rgba(34,197,94,.28);
      transition:filter .15s, transform .1s;
    }
    .login-btn:hover { filter:brightness(1.06); }
    .login-btn:active{ transform:scale(.99); filter:brightness(.97); }
    .login-btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }

    /* Mensagem de erro */
    .login-error{
      min-height:16px; margin-top:12px;
      font-size:12px; text-align:center;
      border-radius:9px; padding:0;
      color:#f87171; transition:all .2s;
    }
    .login-error:not(:empty){
      padding:9px 12px;
      background:rgba(248,113,113,.08);
      border:1px solid rgba(248,113,113,.14);
    }

    /* Rodapé do card */
    .login-footer{
      margin-top:18px; padding-top:14px;
      border-top:1px solid rgba(255,255,255,.07);
      display:flex; align-items:center; justify-content:space-between; gap:8px;
    }
    .login-footer-text{ font-size:10px; color:#475569; }
    .login-status-dot{
      width:7px; height:7px; border-radius:50%;
      background:#1e293b; flex-shrink:0;
      transition:background .3s, box-shadow .3s;
    }
    .login-status-dot.online{
      background:#22c55e;
      box-shadow:0 0 6px rgba(34,197,94,.5);
    }

    header .right{ display:flex; align-items:center; gap:10px; }
    .userpill{
      display:flex; align-items:center; gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color: rgba(255,255,255,.90);
      font-size:11px;
      min-width:0;
      overflow:hidden;
    }
    .userpill span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .logoutBtn{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(239,68,68,.12);
      color: rgba(255,255,255,.92);
      cursor:pointer;
      font-weight:800;
      font-size:12px;
    }
    .logoutBtn:hover{ filter:brightness(1.08); }

    /* ── Hamburger Button ── */
    #hamburgerBtn{
      width:42px; height:42px;
      border-radius:12px;
      background: rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:5px;
      cursor:pointer; flex-shrink:0;
      transition: background .15s;
    }
    #hamburgerBtn:hover{ background: rgba(255,255,255,.13); }
    #hamburgerBtn .bar{
      width:20px; height:2px;
      background:#fff; border-radius:2px;
      transition: transform .25s, opacity .2s;
    }
    /* animação X quando aberto */
    #hamburgerBtn.open .bar:nth-child(1){ transform: translateY(7px) rotate(45deg); }
    #hamburgerBtn.open .bar:nth-child(2){ opacity:0; }
    #hamburgerBtn.open .bar:nth-child(3){ transform: translateY(-7px) rotate(-45deg); }

    /* ── Drawer (painel lateral esquerdo) ── */
    #sideDrawer{
      position:fixed; top:0; left:0; bottom:0; z-index:10000;
      width:min(300px, 88vw);
      background: rgba(10,16,32,0.98);
      border-right:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(12px);
      display:flex; flex-direction:column;
      transform: translateX(-100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      box-shadow: 6px 0 40px rgba(0,0,0,.5);
      padding-top: max(16px, env(safe-area-inset-top));
      overflow: hidden;
    }
    #drawerScroll{
      flex:1; overflow-y:auto; overflow-x:hidden;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.1) transparent;
    }
    #sideDrawer.open{ transform: translateX(0); }

    /* Overlay escuro atrás do drawer */
    #drawerOverlay{
      position:fixed; inset:0; z-index:9999;
      background:rgba(0,0,0,.45);
      opacity:0; pointer-events:none;
      transition: opacity .28s;
    }
    #drawerOverlay.open{ opacity:1; pointer-events:all; }

    /* Cabeçalho do drawer */
    .drawer-header{
      display:flex; align-items:center; justify-content:space-between;
      gap:8px;
      padding:12px 18px 16px;
      border-bottom:1px solid rgba(255,255,255,.08);
      margin-bottom:8px;
      overflow:hidden;
      flex-shrink:0;
    }
    .drawer-title{
      font-size:15px; font-weight:800; color:#fff;
      display:flex; align-items:center; gap:8px;
    }

    /* Seções dentro do drawer */
    .drawer-section{
      padding:10px 14px 4px;
    }
    .drawer-collapsible{
      cursor:pointer;
      display:flex; align-items:center; justify-content:space-between;
      user-select:none;
      border-radius:8px;
      padding:4px 6px;
      margin: 0 -6px;
      transition: background .15s;
    }
    .drawer-collapsible:hover{ background: rgba(255,255,255,.05); }
    .dc-arrow{
      font-size:13px; color: rgba(255,255,255,.4);
      transition: transform .22s;
    }
    .dc-arrow.collapsed{ transform: rotate(-90deg); }
    .drawer-section-label{
      font-size:10px; font-weight:700; letter-spacing:.08em;
      color:rgba(255,255,255,.35); text-transform:uppercase;
      padding: 0 4px 6px;
    }

    /* Itens do drawer */
    .drawer-item{
      display:flex; align-items:center; gap:12px;
      padding:11px 12px;
      border-radius:12px;
      cursor:pointer;
      transition: background .12s;
      color:#e2e8f0;
      font-size:13px; font-weight:500;
      border:none; background:none; width:100%; text-align:left;
    }
    .drawer-item:hover{ background: rgba(255,255,255,.07); }
    .drawer-item:active{ background: rgba(255,255,255,.12); }
    .drawer-item .di-icon{
      width:34px; height:34px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; flex-shrink:0;
    }
    .drawer-item .di-label{ flex:1; }
    .drawer-item .di-badge{
      font-size:10px; font-weight:700;
      padding:3px 8px; border-radius:999px;
      background:rgba(255,255,255,.10); color:rgba(255,255,255,.6);
    }

    /* Toggle chips dentro do drawer */
    .drawer-toggle{
      display:flex; align-items:center; justify-content:space-between;
      padding:9px 12px;
      border-radius:12px;
      color:#e2e8f0; font-size:13px; font-weight:500;
      transition: background .12s;
    }
    .drawer-toggle:hover{ background: rgba(255,255,255,.07); }
    .drawer-toggle .dt-left{ display:flex; align-items:center; gap:10px; }
    .drawer-toggle .dt-icon{
      width:32px; height:32px; border-radius:9px;
      display:flex; align-items:center; justify-content:center;
      font-size:15px;
    }

    /* Switch toggle visual */
    .dt-switch{
      width:40px; height:22px; border-radius:999px;
      background:rgba(255,255,255,.15); position:relative;
      transition:background .2s; flex-shrink:0; cursor:pointer;
    }
    .dt-switch::after{
      content:''; position:absolute;
      width:16px; height:16px; border-radius:50%;
      background:#fff; top:3px; left:3px;
      transition: transform .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .dt-switch.on{ background:#22c55e; }
    .dt-switch.on::after{ transform:translateX(18px); }

    /* Rodapé do drawer */
    .drawer-footer{
      margin-top:auto;
      padding:14px 14px calc(14px + var(--safe-bottom));
      border-top:1px solid rgba(255,255,255,.08);
    }
    .drawer-logout{
      display:flex; align-items:center; gap:10px;
      padding:11px 14px;
      border-radius:12px;
      background:rgba(239,68,68,.12);
      border:1px solid rgba(239,68,68,.2);
      color:#fca5a5; font-size:13px; font-weight:700;
      cursor:pointer; width:100%;
    }
    .drawer-logout:hover{ background:rgba(239,68,68,.2); }
/* ===== Admin Modal ===== */
.modal-backdrop{
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index: 9999;
  padding: 12px;
  box-sizing: border-box;
}
.modal{
  width: min(600px, 100%);
  max-height: calc(100dvh - 24px);
  border-radius: 18px;
  background: rgba(8, 13, 28, 0.99);
  border: 1px solid rgba(255,255,255,.09);
  box-shadow: 0 24px 80px rgba(0,0,0,.7);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.modal-header{ display:none; }
.modal-title{ font-weight: 800; letter-spacing: .2px; font-size: 14px; }
.modal-close{
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  color: #94a3b8;
  border-radius: 10px;
  padding: 8px 13px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  transition: background .15s, color .15s;
}
.modal-close:hover { background: rgba(255,255,255,.14); color: #fff; }
.modal-body{
  padding: 14px 16px;
  overflow-y: auto;
  overflow-x: hidden;
  flex: 1;
  min-height: 0;
}
/* ── Admin modal — tabs ──────────────────────────────────────────────────── */
.tab {
  position: relative;
  padding: 10px 14px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  user-select: none;
  font-weight: 700;
  font-size: 12px;
  color: #64748b;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.adm-tab { display: inline-block; }
.tab:hover { color: #94a3b8; }
.tab.active {
  color: var(--ac, #22c55e);
  border-bottom-color: var(--ac, #22c55e);
}

/* ── Section heading ─────────────────────────────────────────────────────── */
.adm-section-head {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--ac, #86efac);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid color-mix(in srgb, var(--ac, #22c55e) 20%, transparent);
}

/* ── Card-style group ────────────────────────────────────────────────────── */
.adm-group {
  background: rgba(255,255,255,.025);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 12px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 4px;
}

/* ── Two-column row ──────────────────────────────────────────────────────── */
.adm-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
@media (max-width: 420px) { .adm-row { grid-template-columns: 1fr; } }

/* ── Hint text ───────────────────────────────────────────────────────────── */
.adm-hint {
  font-size: 11px;
  color: #475569;
  padding: 7px 10px;
  background: rgba(255,255,255,.03);
  border-radius: 8px;
  border-left: 3px solid rgba(255,255,255,.08);
  line-height: 1.5;
}

/* ── Diagram button ──────────────────────────────────────────────────────── */
.adm-btn-diag {
  background: rgba(99,102,241,.15);
  border: 1px solid rgba(99,102,241,.35);
  color: #a5b4fc;
  font-weight: 800;
  border-radius: 10px;
  padding: 9px 14px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;

/* ── Form fields ─────────────────────────────────────────────────────────── */
.form-grid{

  grid-template-columns: repeat(auto-fit, minmax(min(180px, 100%), 1fr));
  gap: 8px;
}
.form-grid .full{ grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; }
.field label{
  display: block;
  font-size: 10px;
  font-weight: 700;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 5px;
}
.field input, .field select, .field textarea{
  width: 100%;
  padding: 9px 11px;

  border: 1px solid rgba(255,255,255,.10);
  color: #e2e8f0;
  outline: none;
  font-size: 13px;
  box-sizing: border-box;
  min-width: 0;
  transition: border-color .15s, background .15s;
}
.field input:focus, .field select:focus, .field textarea:focus {

  background: rgba(34,197,94,.04);
}
.field textarea { min-height: 80px; resize: vertical; }

  justify-content: flex-end;

  position: sticky;
  bottom: 0;
  background: rgba(10,15,28,.98);
  padding: 10px 0 2px;
  border-top: 1px solid rgba(255,255,255,.06);
}

  padding: 10px 16px;

.btn-danger{

  font-weight: 800;
  border-radius: 10px;

function assertAdmin(){
  const role = getAuthRole();
  if (role !== "admin" && role !== "superadmin"){
    showPopup("Sem permissão", "Apenas administradores podem alterar CTOs, Rotas e CE/CDO.");

// ── adminCrud: tenta online; se offline, enfileira localmente ──────────────
async function adminCrud(path, method, payload){
  if (!assertAdmin()) return null;

  // Se offline, enfileira imediatamente (exceto DELETE — exige confirmação online)
  if (!navigator.onLine){
    if (method === "DELETE"){
      showPopup("Sem conexão", "Remoções requerem conexão. Tente novamente quando estiver online.");
      return null;
    }
    enqueueAdminOp(path, method, payload);
    return { ok: true, offline: true };
  }

  try{
    const res = await authFetch(`${window.WORKER_URL}${path}`, {
      method,
      headers: { "content-type": "application/json" },
      body: payload ? JSON.stringify(payload) : undefined
    });
    const text = await res.text();
    let data = null;
    try{ data = JSON.parse(text); }catch(_){ data = { raw: text }; }
    if (!res.ok){
      const msg = data?.error ? String(data.error) : `HTTP ${res.status}`;
      // Só enfileira offline se for falha de gateway/servidor indisponível (502-504)
      // Para erros 4xx/500 = bug no servidor — mostra erro real, não enfileira
      if (method !== "DELETE" && res.status >= 502 && res.status <= 504){
        enqueueAdminOp(path, method, payload);
        showPopup("Salvo offline", `Servidor indisponível. Registro salvo localmente e será reenviado. (${msg})`);
        return { ok: true, offline: true };
      }
      showPopup("Erro", `${msg}`);
      return null;
    }
    return data;
  } catch(fetchErr){
    // Erro de rede (sem internet detectado tarde)
    if (method !== "DELETE"){
      enqueueAdminOp(path, method, payload);
      showPopup("Salvo offline", "Sem conexão. Registro salvo localmente e será enviado quando a internet voltar.");
      return { ok: true, offline: true };
    }
    showPopup("Erro de rede", String(fetchErr?.message || fetchErr));
    return null;
  }
}

// Enfileira uma operação de admin (CTO / CE / Rota) para sync posterior
function enqueueAdminOp(path, method, payload){
  // Determina kind a partir do path
  const kindMap = {
    "/api/ctos":            "ADMIN_CTO",
    "/api/caixas":          "ADMIN_CE",
    "/api/caixas_emenda_cdo": "ADMIN_CE",
    "/api/rotas":           "ADMIN_ROTA",
    "/api/rotas_fibras":    "ADMIN_ROTA",
  };
  const kind = kindMap[path] || "ADMIN_OP";
  const rota_id   = payload?.rota_id   || payload?.ROTA_ID   || "";
  const cto_id    = payload?.cto_id    || payload?.CTO_ID    || "";
  const ce_id     = payload?.id        || payload?.ID        || "";
  const ref       = rota_id || cto_id || ce_id || "";
  const item = {
    kind,
    ts:      new Date().toISOString(),
    user:    (typeof getAuthUser === "function" ? getAuthUser() : "") || "",
    ref,
    // guarda tudo necessário para o sync
    __adminOp: { path, method, payload }
  };
  const q = getQueue();
  // Evita duplicatas: se já existe item do mesmo kind+ref+method pendente, substitui
  const idx = q.findIndex(x => x.__adminOp && x.__adminOp.method === method &&
                               x.kind === kind && x.ref === ref);
  if (idx >= 0) q[idx] = item; else q.push(item);
  setQueue(q);
  const badge = document.getElementById("badge");
  if (badge) badge.textContent = `💾 Salvo offline • Pendentes: ${q.length}`;
}

// ── buildCtosGeoJSON ────────────────────────────────────────────────────────
// Busca CTOs + movimentações e monta o GeoJSON com pct/used/cap calculados.
// Usado tanto no map.on("load") quanto no refreshAllData para garantir cores corretas.
async function buildCtosGeoJSON(){
  try {
    // Busca CTOs e movimentações em paralelo
    const [ctosResp, movsResp] = await Promise.all([
      authFetch(`${window.WORKER_URL}/api/ctos`),
      authFetch(`${window.WORKER_URL}/api/movimentacoes`)
    ]);
    const ctosData = ctosResp.ok ? await ctosResp.json().catch(()=>({})) : {};
    const movsData = movsResp.ok ? await movsResp.json().catch(()=>({})) : {};
    const ctos = unwrapArray(ctosData);
    const movs = unwrapArray(movsData);

    ctosItems = ctos; // cache global p/ lista no chip "CTOs"

    const usedByCto        = new Map();
    const tmpByCto         = new Map();
    const lastByCtoCliente = new Map();

    for (const mv0 of movs) {
      const nm = normalizeMov(mv0);
      const id = String(nm.cto_id || "").trim();
      if (!id) continue;
      usedByCto.set(id, (usedByCto.get(id) || 0) + 1);
      if (!tmpByCto.has(id)) tmpByCto.set(id, []);
      tmpByCto.get(id).push(nm);
      const cliKey = (nm.cliente || "").trim();
      if (cliKey) {
        if (!lastByCtoCliente.has(id)) lastByCtoCliente.set(id, new Map());
        const mCli = lastByCtoCliente.get(id);
        const prev = mCli.get(cliKey);
        const useNew = !prev || (!prev.ts && nm.ts) || (prev.ts && nm.ts && String(nm.ts) > String(prev.ts));
        if (useNew) mCli.set(cliKey, nm);
      }
    }

    movByCto = new Map();
    onlineClientsByCto = new Map();
    for (const [id, arr] of tmpByCto.entries()) {
      movByCto.set(id, arr.slice().sort((a,b) => String(b.ts||"").localeCompare(String(a.ts||""))));
      const mCli = lastByCtoCliente.get(id) || new Map();
      const online = [];
      for (const [cliente, last] of mCli.entries()) {
        if (String(last.tipo || "").toUpperCase() === "DESATIVACAO") continue;
        online.push({ cliente, last_ts: last.ts, last_tipo: last.tipo, usuario: last.usuario, obs: last.obs });
      }
      online.sort((a,b) => String(b.last_ts||"").localeCompare(String(a.last_ts||"")));
      onlineClientsByCto.set(id, online);
    }

    // Expor para o módulo de busca global (initGlobalSearch está em outro escopo)
    window._searchIndex = { ctosItems, onlineClientsByCto, movByCto };

    return {
      type: "FeatureCollection",
      features: ctos.map(cto => {
        const cap  = Number(cto.capacidade || 0) || 0;
        const used = usedByCto.get(String(cto.cto_id || "").trim()) || 0;
        const pct  = cap > 0 ? used / cap : 0;
        return {
          type: "Feature",
          geometry: { type: "Point", coordinates: [Number(cto.lng||0), Number(cto.lat||0)] },
          properties: { ...cto, used, cap, pct }
        };
      }).filter(f => f.geometry.coordinates[0] !== 0 || f.geometry.coordinates[1] !== 0)
    };
  } catch(e) {
    console.warn("buildCtosGeoJSON:", e);
    return { type: "FeatureCollection", features: [] };
  }
}

async function gpsPickUseMyLocation() {
  closeGpsPickSheet();
  const btn = document.getElementById("btnGpsPickUseMyLoc");

  // Tenta GPS em tempo real primeiro
  const tryLive = () => new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error("sem geolocalização"));
    navigator.geolocation.getCurrentPosition(
      p => resolve({ lat: p.coords.latitude, lng: p.coords.longitude, acc: p.coords.accuracy }),
      err => reject(err),
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 5000 }
    );
  });

  let coords = null;
  try {
    coords = await tryLive();
  } catch (_) {
    // fallback para último GPS salvo
    const saved = lastGPS ? lastGPS() : null;
    if (saved && saved.lat && saved.lng) {
      coords = { lat: saved.lat, lng: saved.lng, acc: saved.acc };
    }
  }

  if (!coords) {
    showPopup("GPS indisponível", "Não foi possível obter sua localização. Ative o GPS ou use 'Clicar no mapa'.");
    return;
  }

  const { lat, lng } = coords;

  // Preenche lat/lng no formulário
  if (__gpsPickKind === "cto") {
    if (qs("cto_lat")) qs("cto_lat").value = String(lat.toFixed(7));
    if (qs("cto_lng")) qs("cto_lng").value = String(lng.toFixed(7));
  } else if (__gpsPickKind === "ce") {
    if (qs("ce_lat")) qs("ce_lat").value = String(lat.toFixed(7));
    if (qs("ce_lng")) qs("ce_lng").value = String(lng.toFixed(7));
  }

  // Reverse geocode
  try {
    const geo = await reverseGeocode(lat, lng);
    if (geo) {
      if (__gpsPickKind === "cto") {
        if (qs("cto_rua")    && !qs("cto_rua").value)    qs("cto_rua").value    = geo.rua    || "";
        if (qs("cto_bairro") && !qs("cto_bairro").value) qs("cto_bairro").value = geo.bairro || "";
      } else if (__gpsPickKind === "ce") {
        if (qs("ce_rua")    && !qs("ce_rua").value)    qs("ce_rua").value    = geo.rua    || "";
        if (qs("ce_bairro") && !qs("ce_bairro").value) qs("ce_bairro").value = geo.bairro || "";
      }
    }
  } catch (_) {}

  // Centraliza mapa na posição
  if (map) map.easeTo({ center: [lng, lat], zoom: Math.max(map.getZoom(), 17), duration: 600 });

  // Reabre o modal admin
  openAdminModal(__gpsPickKind === "ce" ? "ce" : "cto");
}

// ── refreshAllData ───────────────────────────────────────────────────────────
// Atualiza as fontes do mapa sem recarregar a página.
// Offline → não faz nada (mapa continua com dados em memória).
async function refreshAllData(){
  if (!navigator.onLine) {
    const badge = document.getElementById("badge");
    if (badge) badge.textContent = "💾 Offline — dados locais mantidos";
    return;
  }
  const _m = window.map || (typeof map !== "undefined" ? map : null);
  if (!_m) return;

  // ── Todos os fetches em PARALELO ──────────────────────────────────────────
  const [ctosGeoResult, caixasResult, rotasResult, postesResult] = await Promise.allSettled([
    buildCtosGeoJSON(),
    authFetch(`${window.WORKER_URL}/api/caixas_emenda_cdo`).then(r => r.ok ? r.json() : {}),
    authFetch(`${window.WORKER_URL}/api/rotas_fibras`).then(r => r.ok ? r.json() : {}),
    authFetch(`${window.WORKER_URL}/api/postes`).then(r => r.ok ? r.json() : {})
  ]);

  // Aplica CTOs
  if (ctosGeoResult.status === "fulfilled") {
    try {
      const ctosSrc = _m.getSource("ctos");
      if (ctosSrc) ctosSrc.setData(ctosGeoResult.value);
    } catch(_) {}
  }

  // Aplica CE/CDO
  if (caixasResult.status === "fulfilled") {
    try {
      const caixas = unwrapArray(caixasResult.value);
      const caixasGeo = {
        type: "FeatureCollection",
        features: caixas
          .filter(cx => cx.lat && cx.lng)
          .map(cx => ({
            type: "Feature",
            properties: { ...cx },
            geometry: { type: "Point", coordinates: [Number(cx.lng||0), Number(cx.lat||0)] }
          }))
      };
      const caixasSrc = _m.getSource("caixas");
      if (caixasSrc) caixasSrc.setData(caixasGeo);
    } catch(_) {}
  }

  // Aplica Rotas (normaliza tipo para UPPERCASE em cada feature)
  if (rotasResult.status === "fulfilled") {
    try {
      let rotasData = (rotasResult.value?.geojson || rotasResult.value?.data) ?? rotasResult.value;
      if (rotasData?.type === "FeatureCollection" && Array.isArray(rotasData.features)) {
        rotasData = {
          ...rotasData,
          features: rotasData.features.map(ft => {
            const p = ft.properties || {};
            const tipoNorm = String(p.tipo || p.TIPO || "").toUpperCase().trim();
            return { ...ft, properties: { ...p, tipo: tipoNorm || "RAMAL" } };
          })
        };
      }
      const rotasSrc = _m.getSource("rotas");
      if (rotasSrc && rotasData?.type === "FeatureCollection") rotasSrc.setData(rotasData);
    } catch(_) {}
  }

  // Aplica Postes
  if (postesResult.status === "fulfilled") {
    try {
      const postes = unwrapArray(postesResult.value);
      const postesGeo = buildPostesGeoJSON(postes);
      const src = _m.getSource("postes");
      if (src) src.setData(postesGeo);
      else if (typeof window._reloadPostesLayer === "function") window._reloadPostesLayer().catch(()=>{});
    } catch(_) {}
  }

  // OLTs (paralelo — não-bloqueante)
  if (typeof window._reloadOltsLayer === "function") {
    window._reloadOltsLayer().catch(()=>{});
  }

  const badge = document.getElementById("badge");
  if (badge) badge.textContent = `BUILD: ${window.__BUILD_ID__} • OK`;
}

function ensureRouteEditLayers(){
  const _m = window.map || (typeof map !== "undefined" ? map : null);
  if (!_m) return;
  const srcId = "route-edit-src";
  const lineId = "route-edit-line";
  const ptId = "route-edit-pts";
  if (!_m.getSource(srcId)){
    _m.addSource(srcId, { type:"geojson", data:{ type:"FeatureCollection", features:[] } });
  }
  if (!_m.getLayer(lineId)){
    _m.addLayer({ id: lineId, type:"line", source: srcId, paint: { "line-width": 4, "line-opacity": 0.9 } });
  }
  if (!_m.getLayer(ptId)){
    _m.addLayer({ id: ptId, type:"circle", source: srcId, paint: { "circle-radius": 5, "circle-opacity": 0.9 } });
  }
}

function updateRouteEditLine(){
  const _m = window.map || (typeof map !== "undefined" ? map : null);
  if (!_m) return;
  const src = _m.getSource("route-edit-src");
  if (!src) return;
  const pts = (__routeEdit && __routeEdit.points) ? __routeEdit.points : [];
  const features = [];
  if (pts.length >= 2){
    features.push({ type:"Feature", properties:{}, geometry:{ type:"LineString", coordinates: pts } });
  }
  for (const c of pts){
    features.push({ type:"Feature", properties:{}, geometry:{ type:"Point", coordinates: c } });
  }
  src.setData({ type:"FeatureCollection", features });

  // mantém textarea sincronizada (se existir)
  try{ syncRotaGeojsonFromEditor(); }catch(_){ }
}

function addRoutePoint(lng, lat){
  if (!__routeEdit || !__routeEdit.active) return;
  const _m = window.map || (typeof map !== "undefined" ? map : null);
  if (!_m) return;
  const idx = __routeEdit.points.length;
  __routeEdit.points.push([lng, lat]);

  // marker draggable para editar vértice
  const el = document.createElement("div");
  el.style.width = "14px";
  el.style.height = "14px";
  el.style.borderRadius = "50%";
  el.style.background = "rgba(255,255,255,0.9)";
  el.style.border = "2px solid rgba(0,0,0,0.4)";

  const mk = new maplibregl.Marker({ element: el, draggable: true })
    .setLngLat([lng, lat])
    .addTo(_m);

  mk.on("dragend", ()=>{
    try{
      const ll = mk.getLngLat();
      __routeEdit.points[idx] = [ll.lng, ll.lat];
      updateRouteEditLine();
    }catch(_){ }
  });

  // clique no vértice remove (ctrl/cmd) ou abre info
  el.addEventListener("click", (ev)=>{
    try{
      ev.stopPropagation();
      if (ev.ctrlKey || ev.metaKey){
        removeRoutePoint(idx);
      }
    }catch(_){ }
  });

  __routeEdit.markers.push(mk);
  updateRouteEditLine();
}

function removeRoutePoint(index){
  if (!__routeEdit) return;
  if (index < 0 || index >= __routeEdit.points.length) return;
  __routeEdit.points.splice(index,1);
  // remove all markers and rebuild with fresh indices
  try{
    for (const mk of __routeEdit.markers){ try{ mk.remove(); }catch(_){ } }
  }catch(_){ }
  __routeEdit.markers = [];
  const pts = [...__routeEdit.points];
  __routeEdit.points = [];
  for (const p of pts){ addRoutePoint(p[0], p[1]); }
}

function clearRouteEditor(){
  if (!__routeEdit) return;
  try{ for (const mk of __routeEdit.markers){ try{ mk.remove(); }catch(_){ } } }catch(_){ }
  __routeEdit = { active:false, points:[], markers:[], mode:'draw' };
  updateRouteEditLine();
}

function syncRotaGeojsonFromEditor(){
  if (!__routeEdit || !__routeEdit.points) return;
  const pts = __routeEdit.points;
  if (!qs("rota_geojson")) return;
  if (pts.length < 2) return;
  const feature = { type:"Feature", properties:{}, geometry:{ type:"LineString", coordinates: pts } };
  qs("rota_geojson").value = JSON.stringify({ type:"FeatureCollection", features:[feature] }, null, 2);
}

function fillRouteEditorFromGeojson(geojson){
  try{
    let gj = geojson;
    if (typeof gj === "string") gj = JSON.parse(gj);
    if (!gj) return;
    let coords = null;
    if (gj.type === "FeatureCollection" && gj.features && gj.features[0] && gj.features[0].geometry && gj.features[0].geometry.type === "LineString"){
      coords = gj.features[0].geometry.coordinates;
    } else if (gj.type === "Feature" && gj.geometry && gj.geometry.type === "LineString"){
      coords = gj.geometry.coordinates;
    }
    if (!Array.isArray(coords)) return;
    clearRouteEditor();
    __routeEdit.active = true;
    setPickBanner(true, "Editando rota: clique adiciona ponto, arraste para ajustar. Ctrl+clique no ponto remove.");
    ensureRouteEditLayers();
    for (const c of coords){ if (Array.isArray(c) && c.length>=2) addRoutePoint(c[0], c[1]); }
  }catch(_){ }
}

  transformador:{ label: "Com Transformador", icon: "⚡", color: "#dc2626" }, // vermelho vivo

function buildPostesGeoJSON(postes) {
  return {
    type: "FeatureCollection",
    features: (postes || [])
      .filter(p => p.lat && p.lng && isFinite(Number(p.lat)) && isFinite(Number(p.lng)))
      .map(p => ({
        type: "Feature",
        geometry: { type: "Point", coordinates: [Number(p.lng), Number(p.lat)] },
        properties: {
          id:           p.poste_id || "",
          tipo:         p.tipo     || "simples",

async function reverseGeocode(lat, lng){
  try{
    const base = getApiBase();
    const url = `${base}/api/reverse_geocode?lat=${encodeURIComponent(lat)}&lng=${encodeURIComponent(lng)}`;
    const res = await apiFetch(url, { method: "GET" });
    if (!res.ok) return null;
    const data = await res.json().catch(()=>null);
    if (!data || !data.ok) return null;
    return { rua: data.rua || "", bairro: data.bairro || "", raw: data.raw || null };
  }catch(_){
    return null;
  }
}

        if (badge3 && badgeTxt3) {
          badge3.style.background = "rgba(34,197,94,.1)";
          badge3.style.borderColor = "rgba(34,197,94,.25)";
          badge3.style.color = "#86efac";

        showPopup("📍 Posição capturada", `Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}<br><br>Preencha o nome e salve a OLT.`);
      }, 80);

    if (k === "cto"){

      if (qs("cto_id") && !String(qs("cto_id").value||"").trim()){

// === Admin: marcador temporário arrastável (para ajustar posição ao criar/editar) ===
let __tempPickMarker = null;

function removeTempPickMarker(){
  try{ if (__tempPickMarker){ __tempPickMarker.remove(); } }catch(_){}
  __tempPickMarker = null;
}

function ensureTempDragMarker(kind, lng, lat, onMoved){
  const map = window.map || (typeof map !== "undefined" ? map : null);
  if (!map) return;

  removeTempPickMarker();

  // elemento simples (não depende de assets)
  const el = document.createElement("div");
  el.className = "temp-pick-marker";
  el.title = "Arraste para ajustar a posição";

  const mk = new maplibregl.Marker({ element: el, draggable: true })
    .setLngLat([lng, lat])
    .addTo(map);

  mk.on("dragend", async ()=>{
    try{
      const ll = mk.getLngLat();
      if (typeof onMoved === "function") await onMoved(ll.lng, ll.lat);
    }catch(_){}
  });

  // clique no marcador abre os detalhes (CTO/CE)
  el.addEventListener("click", (ev)=>{
    try{
      ev.stopPropagation();
      if (kind === "cto"){
        selected = { type: "cto", props: buildCTOPayload() || {}, lngLat: mk.getLngLat() };
      } else if (kind === "ce"){
        selected = { type: "caixa", props: buildCEPayload() || {}, lngLat: mk.getLngLat() };
      }
      showSelectedSheet();
    }catch(_){}
  });

  __tempPickMarker = mk;
}



// ══════════════════════════════════════════════════════════════════════════════
//  DRAG-REPOSITION — Reposicionar CTO/CE existente arrastando no mapa
// ══════════════════════════════════════════════════════════════════════════════
let __dragRepoState = null; // { kind, cto_id, origLng, origLat, marker, onConfirm }

function _dragRepoBannerShow(show) {
  const el = document.getElementById("dragRepoBanner");
  if (!el) return;
  if (show) {
    el.style.display = "block";
    requestAnimationFrame(() => { el.style.transform = "translateY(0)"; });
  } else {
    el.style.transform = "translateY(100%)";
    setTimeout(() => { el.style.display = "none"; }, 260);
  }
}

function _dragRepoUpdateCoords(lng, lat) {
  const el = document.getElementById("dragRepoCoords");
  if (el) el.textContent = `Lat: ${Number(lat).toFixed(6)}  ·  Lng: ${Number(lng).toFixed(6)}`;
}

function startCTODragReposition(kind) {
  // kind: "cto" | "ce"
  const _map = window.map || (typeof map !== "undefined" ? map : null);
  if (!_map) return;

  const isCtO = kind !== "ce";
  const latEl = qs(isCtO ? "cto_lat" : "ce_lat");
  const lngEl = qs(isCtO ? "cto_lng" : "ce_lng");
  const idEl  = qs(isCtO ? "cto_id"  : "ce_id");

  const lat = parseFloat(latEl?.value);
  const lng = parseFloat(lngEl?.value);
  if (!isFinite(lat) || !isFinite(lng)) { openGpsPickSheet(kind); return; }

  const ctoId = String(idEl?.value || "").trim();

  // Fechar o modal admin
  closeAdminModal();

  // Centralizar mapa na CTO
  _map.easeTo({ center: [lng, lat], zoom: Math.max(_map.getZoom(), 17), duration: 500 });

  // Criar marcador arrastável
  removeTempPickMarker();
  const el = document.createElement("div");
  el.style.cssText = [
    "width:28px;height:28px;border-radius:50%;",
    "background:#ef4444;border:3px solid #fff;",
    "box-shadow:0 0 0 4px rgba(239,68,68,.35),0 4px 16px rgba(0,0,0,.5);",
    "cursor:grab;transition:transform .1s;",
  ].join("");
  el.title = "Arraste para reposicionar";
  el.addEventListener("mousedown", () => { el.style.transform = "scale(1.18)"; el.style.cursor = "grabbing"; });
  el.addEventListener("mouseup",   () => { el.style.transform = "scale(1)";    el.style.cursor = "grab"; });

  const mk = new maplibregl.Marker({ element: el, draggable: true })
    .setLngLat([lng, lat])
    .addTo(_map);

  mk.on("drag", () => {
    const ll = mk.getLngLat();
    _dragRepoUpdateCoords(ll.lng, ll.lat);
  });

  __tempPickMarker = mk;

  // Estado
  __dragRepoState = { kind, ctoId, origLng: lng, origLat: lat, marker: mk };

  // Atualiza banner
  const title = document.getElementById("dragRepoTitle");
  if (title) title.textContent = "Reposicionar " + (isCtO ? "CTO" : "CE/CDO") + (ctoId ? " — " + ctoId : "");
  _dragRepoUpdateCoords(lng, lat);
  _dragRepoBannerShow(true);
}
window.startCTODragReposition = startCTODragReposition;

async function dragRepoConfirm() {
  const state = __dragRepoState;
  if (!state || !state.marker) return;
  const ll = state.marker.getLngLat();
  const lng = parseFloat(ll.lng.toFixed(7));
  const lat = parseFloat(ll.lat.toFixed(7));

  // Previne confirmação sem movimento (trava visual)
  const confirmBtn = document.getElementById("dragRepoConfirmBtn");
  if (confirmBtn) { confirmBtn.textContent = "⏳ Salvando…"; confirmBtn.disabled = true; }

  try {
    // Preenche o formulário
    const isCtO = state.kind !== "ce";
    const latEl = qs(isCtO ? "cto_lat" : "ce_lat");
    const lngEl = qs(isCtO ? "cto_lng" : "ce_lng");
    if (latEl) latEl.value = String(lat);
    if (lngEl) lngEl.value = String(lng);

    // Reverse geocode — preenche rua/bairro
    try {
      const geo = await reverseGeocode(lat, lng);
      if (geo && isCtO) {
        if (qs("cto_rua")    && !qs("cto_rua").value)    qs("cto_rua").value    = geo.rua    || "";
        if (qs("cto_bairro") && !qs("cto_bairro").value) qs("cto_bairro").value = geo.bairro || "";
      } else if (geo) {
        if (qs("ce_rua")    && !qs("ce_rua").value)    qs("ce_rua").value    = geo.rua    || "";
        if (qs("ce_bairro") && !qs("ce_bairro").value) qs("ce_bairro").value = geo.bairro || "";
      }
    } catch(_) {}

    // Salva direto via API
    let ok = false;
    if (isCtO) {
      const payload = buildCTOPayload();
      if (payload) {
        const r = await adminCrud("/api/ctos", "POST", payload);
        ok = !!r;
      }
    } else {
      const payload = buildCEPayload();
      if (payload) {
        const r = await adminCrud("/api/caixas", "POST", payload);
        ok = !!r;
      }
    }

    _dragRepoBannerShow(false);
    removeTempPickMarker();
    __dragRepoState = null;

    if (ok) {
      showPopup(
        "✅ Posição atualizada",
        `<b>${escapeHTML(state.ctoId)}</b> reposicionado.<br>` +
        `<span style="font-size:11px;color:#94a3b8;">Lat: ${lat.toFixed(6)} · Lng: ${lng.toFixed(6)}</span>`
      );
      try { await refreshAllData(); } catch(_) {}
    }
  } finally {
    if (confirmBtn) { confirmBtn.textContent = "💾 Confirmar posição"; confirmBtn.disabled = false; }
  }
}
window.dragRepoConfirm = dragRepoConfirm;

function dragRepoCancel() {
  const _kind = __dragRepoState?.kind || "cto";
  _dragRepoBannerShow(false);
  removeTempPickMarker();
  __dragRepoState = null;
  openAdminModal(_kind === "ce" ? "ce" : "cto");
}
window.dragRepoCancel = dragRepoCancel;

function numOrStr(v){
  const s = String(v ?? "").trim();
  if (!s) return "";
  const n = Number(s.replace(",", "."));
  return Number.isFinite(n) ? n : s;
}


function pad2(n){ return String(n).padStart(2,"0"); }
function genId(prefix){
  const d = new Date();
  const y = d.getFullYear();
  const mo = pad2(d.getMonth()+1);
  const da = pad2(d.getDate());
  const hh = pad2(d.getHours());
  const mi = pad2(d.getMinutes());
  const ss = pad2(d.getSeconds());
  return `${prefix}-${y}${mo}${da}-${hh}${mi}${ss}`;
}

function buildCTOPayload(){
  const cto_id = String(qs("cto_id")?.value || "").trim();
  if (!cto_id){ showPopup("Campo obrigatório", "Informe o CTO ID."); return null; }
  const cdoIdVal   = String(qs("cto_cdo_id")?.value||"").trim();
  const portaCdoV  = Number(qs("cto_porta_cdo")?.value||0)||null;
  const splitCtoV  = String(qs("cto_splitter")?.value||"").trim();
  return {
    cto_id,
    nome: String(qs("cto_nome")?.value || "").trim(),
    capacidade: Number(qs("cto_capacidade")?.value||0)||null,
    lat: numOrStr(qs("cto_lat")?.value),
    lng: numOrStr(qs("cto_lng")?.value),
    cdo_id: cdoIdVal || null,
    porta_cdo: portaCdoV,
    splitter_cto: splitCtoV || null,
  };
}
function buildCEPayload(){
  const id = String(qs("ce_id")?.value || "").trim();
  if (!id){ showPopup("Campo obrigatório", "Informe o ID da CE/CDO."); return null; }
  const oltIdVal  = String(qs("ce_olt_id")?.value||"").trim();
  const portaOltV = Number(qs("ce_porta_olt")?.value||0)||null;
  const splitCdoV = String(qs("ce_splitter")?.value||"").trim();
  return {
    id,
    tipo: String(qs("ce_tipo")?.value || "CE"),
    nome: String(qs("ce_nome")?.value || "").trim(),
    obs: String(qs("ce_obs")?.value || "").trim(),

    lng: numOrStr(qs("ce_lng")?.value),
    olt_id: oltIdVal || null,
    porta_olt: portaOltV,

  };
}
function buildRotaPayload(){
  let rota_id = String(qs("rota_id")?.value || "").trim();
  if (!rota_id){ rota_id = genId("ROTA"); if (qs("rota_id")) qs("rota_id").value = rota_id; }
  let geojsonRaw = String(qs("rota_geojson")?.value || "").trim();

  if (!geojsonRaw){ showPopup("Campo obrigatório", "Desenhe a rota no mapa ou cole um GeoJSON."); return null; }
  let geojson = geojsonRaw;
  try{ geojson = JSON.parse(geojsonRaw); }catch(e){
    showPopup("GeoJSON inválido", "O conteúdo do campo GeoJSON não é válido: " + e.message);
    return null;
  }
  return {
    rota_id,
    nome: String(qs("rota_nome")?.value || "").trim(),
    geojson
  };
}

// ===== Editar ao clicar em um item no mapa (admin) =====
function normalizeId(props, keys){
  for (const k of keys){
    if (props && props[k] != null && String(props[k]).trim() !== "") return String(props[k]).trim();
  }
  return "";
}

function fillCTOFromProps(props, lngLat){
  qs("cto_id").value = normalizeId(props, ["cto_id","CTO_ID","id","ID","cto","CTO"]);
  qs("cto_nome").value = String(props.nome || props.NOME || props.name || props.NAME || "").trim();
  if (lngLat){
    qs("cto_lat").value = String(lngLat.lat);
    qs("cto_lng").value = String(lngLat.lng);
  } else {
    const lat = props.lat ?? props.LAT ?? props.latitude ?? props.LATITUDE;
    const lng = props.lng ?? props.LNG ?? props.lon ?? props.LON ?? props.longitude ?? props.LONGITUDE;
    if (lat!=null) qs("cto_lat").value = String(lat);
    if (lng!=null) qs("cto_lng").value = String(lng);
  }
  openAdminModal("cto");
}

function fillCEFromProps(props, lngLat){
  qs("ce_id").value = normalizeId(props, ["id","ID","ce_id","CE_ID","cdo_id","CDO_ID"]);
  qs("ce_tipo").value = String(props.tipo || props.TIPO || "CE").toUpperCase() === "CDO" ? "CDO" : "CE";
  qs("ce_nome").value = String(props.nome || props.NOME || props.name || "").trim();
  qs("ce_obs").value = String(props.obs || props.OBS || props.observacao || props.Observacao || "").trim();
  if (lngLat){
    qs("ce_lat").value = String(lngLat.lat);
    qs("ce_lng").value = String(lngLat.lng);
  } else {
    const lat = props.lat ?? props.LAT ?? props.latitude ?? props.LATITUDE;
    const lng = props.lng ?? props.LNG ?? props.lon ?? props.LON ?? props.longitude ?? props.LONGITUDE;
    if (lat!=null) qs("ce_lat").value = String(lat);
    if (lng!=null) qs("ce_lng").value = String(lng);
  }
  openAdminModal("ce");
}

function fillRotaFromProps(props){
  qs("rota_id").value = normalizeId(props, ["rota_id","ROTA_ID","id","ID"]);
  qs("rota_nome").value = String(props.nome || props.NOME || props.name || "").trim();
  // Se existir geojson na feature, tenta preencher
  const gj = props.geojson || props.GEOJSON || props.geometry || props.GEOMETRY;
  if (gj){
    try{ fillRouteEditorFromGeojson(gj); qs("rota_geojson").value = JSON.stringify(typeof gj === "string" ? JSON.parse(gj) : gj, null, 2); }
    catch(_){ qs("rota_geojson").value = String(gj); }
  }
  // fecha o modal para liberar clique no mapa
  try{ closeAdminModal(); }catch(_){ }
}

function enableFeatureEditOnClick(map){
  // Evita múltiplos binds
  if (map.__ftthEditOnClickBound) return;
  map.__ftthEditOnClickBound = true;

  map.on("click", (e)=>{
    try{
      // se estiver em pickMode (lat/lng), deixa o handler existente consumir primeiro
      if (__pickMode) return;
      // se estiver desenhando rota, não abrir modal de edição
      if (__drawRota && __drawRota.active) return;
      if (getAuthRole() !== "admin" && getAuthRole() !== "superadmin") return;
      if (!window.__ftthAllowMapClickToOpenAdmin) return;

      // pega feature mais "provável" sob o clique
      const features = map.queryRenderedFeatures(e.point) || [];
      if (!features.length) return;

      // tenta classificar por propriedades conhecidas
      let best = null;
      for (const f of features){
        const p = f.properties || {};
        if (!best) best = f;
        // prioridade: CTO
        if (p.cto_id || p.CTO_ID || p.cto || p.CTO) { best = f; break; }
      }

      const p = (best && best.properties) ? best.properties : {};
      // Heurística de entidade
      const hasCTO = !!(p.cto_id || p.CTO_ID || p.cto || p.CTO);
      const hasCE  = !!(p.tipo || p.TIPO || p.ce_id || p.CE_ID || p.cdo_id || p.CDO_ID || p.ce || p.CE);
      const hasRota = !!(p.rota_id || p.ROTA_ID || (best && (best.geometry?.type || "")).includes("Line"));

      if (hasCTO){
        fillCTOFromProps(p, e.lngLat);
      } else if (hasRota){
        fillRotaFromProps(p);
      } else if (hasCE){
        fillCEFromProps(p, e.lngLat);
      } else {
        // fallback: se for ponto, assume CE/CTO dependendo de 'layer/source' name
        const layerId = best.layer && best.layer.id ? String(best.layer.id) : "";
        if (/cto/i.test(layerId)) fillCTOFromProps(p, e.lngLat);
        else if (/rota/i.test(layerId)) fillRotaFromProps(p);
        else if (/caixa|cdo|ce/i.test(layerId)) fillCEFromProps(p, e.lngLat);
      }
    } catch(_){}
  });
}

// ===== Desenhar rota no mapa — com seletor de tipo (Backbone / Ramal / Drop) =====
// Estrutura: segments = [{tipo:'BACKBONE', points:[{lng,lat}...]}, ...]
let __drawRota = {
  active: false,
  currentTipo: 'BACKBONE',
  segments: [],       // [{tipo, points:[{lng,lat}]}]
  markers: [],        // todos os marcadores visuais
  sourceId: "__draw_rota_src"
};

// Cores e estilos por tipo
const DRAW_TIPO_STYLES = {
  BACKBONE: { color:'#a855f7', width:6, dash:null,      markerColor:'#a855f7' },
  RAMAL:    { color:'#111827', width:3.5, dash:null,    markerColor:'#374151' },
  DROP:     { color:'#22c55e', width:2,  dash:[4,3],    markerColor:'#22c55e' }
};

function currentSegment(){
  if (!__drawRota.segments.length) return null;
  return __drawRota.segments[__drawRota.segments.length - 1];
}

function setDrawTipo(tipo){
  __drawRota.currentTipo = tipo;
  // Atualiza visual dos botões no HUD
  ['BACKBONE','RAMAL','DROP'].forEach(t => {
    const btn = document.getElementById('drawTipo_' + t);
    if (!btn) return;
    btn.classList.toggle('active', t === tipo);
    btn.style.opacity = (t === tipo) ? '1' : '0.5';
    btn.style.transform = (t === tipo) ? 'scale(1.05)' : 'scale(1)';
  });
  // Atualiza contador e tipo atual no HUD
  const tipoLabel = document.getElementById('drawTipoLabel');
  if (tipoLabel) tipoLabel.textContent = tipo;
  // Se já tem segmento ativo com pontos, fecha-o e começa um novo do mesmo ponto
  const seg = currentSegment();
  if (seg && seg.tipo !== tipo && seg.points.length > 0){
    const lastPt = seg.points[seg.points.length - 1];
    __drawRota.segments.push({ tipo, points: [lastPt] });
  } else if (!seg || seg.tipo !== tipo) {
    __drawRota.segments.push({ tipo, points: [] });
  }
  updateDrawLineAll();
}

function setRotaDrawButtons(active){
  const undo = qs("btnRotaUndo"), cancel = qs("btnRotaCancel"), finish = qs("btnRotaFinish"), draw = qs("btnDrawRota");
  if (undo) undo.style.display = active ? "" : "none";
  if (cancel) cancel.style.display = active ? "" : "none";
  if (finish) finish.style.display = active ? "" : "none";
  if (draw) draw.style.display = active ? "none" : "";
  // HUD
  const hud = qs("routeDrawHud");
  if (hud) hud.style.display = active ? "flex" : "none";
}

function ensureDrawLayer(map){
  const srcId = __drawRota.sourceId;
  if (!map.getSource(srcId)){
    map.addSource(srcId, { type:"geojson", data:{ type:"FeatureCollection", features:[] } });
  }
  // Uma layer por tipo para suportar dasharray diferente
  const layerDefs = [
    { id:"__draw_backbone", filter:["==",["get","tipo"],"BACKBONE"], color:"#a855f7", width:6, dash:null },
    { id:"__draw_ramal",    filter:["==",["get","tipo"],"RAMAL"],    color:"#111827", width:3.5, dash:null },
    { id:"__draw_drop",     filter:["==",["get","tipo"],"DROP"],     color:"#22c55e", width:2, dash:[6,4] },
    { id:"__draw_default",  filter:["!",["in",["get","tipo"],["literal",["BACKBONE","RAMAL","DROP"]]]], color:"#f59e0b", width:3, dash:null }
  ];
  for (const def of layerDefs){
    if (!map.getLayer(def.id)){
      const paint = {
        "line-color": def.color,
        "line-width": def.width,
        "line-opacity": 0.92
      };
      if (def.dash) paint["line-dasharray"] = def.dash;
      map.addLayer({
        id: def.id, type:"line", source: srcId,
        filter: def.filter,
        layout:{ "line-join":"round","line-cap":"round" },
        paint
      });
    }
  }
}

function updateDrawLineAll(){
  const _m = window.map || (typeof map !== "undefined" ? map : null);
  if (!_m) return;
  const src = _m.getSource(__drawRota.sourceId);
  if (!src) return;
  const features = [];
  for (const seg of __drawRota.segments){
    if (seg.points.length >= 2){
      features.push({
        type:"Feature",
        properties:{ tipo: seg.tipo },
        geometry:{ type:"LineString", coordinates: seg.points.map(p=>[p.lng,p.lat]) }
      });
    }
  }
  src.setData({ type:"FeatureCollection", features });
  // Atualiza contador
  const totalPts = __drawRota.segments.reduce((acc,s)=>acc+s.points.length,0);
  const counter = document.getElementById('drawPointCount');
  if (counter) counter.textContent = totalPts + ' pt' + (totalPts !== 1 ? 's' : '');
}

// Alias para compatibilidade
function updateDrawLine(map){ updateDrawLineAll(); }

function clearDrawMarkers(){
  try{ for (const m of __drawRota.markers){ m.remove(); } }catch(_){}
  __drawRota.markers = [];
}

function startDrawRota(){
  try{ closeAdminModal(); }catch(_){ }
  if (!assertAdmin()) return;
  const map = window.map || (typeof map !== "undefined" ? map : null);
  if (!map){ showPopup("Erro", "Mapa não inicializado."); return; }

  // Reset state
  __drawRota.active = true;
  __drawRota.currentTipo = 'BACKBONE';
  __drawRota.segments = [{ tipo:'BACKBONE', points:[] }];
  clearDrawMarkers();

  setRotaDrawButtons(true);
  setPickBanner(true);
  if (qs("pickBanner")) qs("pickBanner").textContent = "🧵 Clique no mapa para adicionar pontos da rota.";

  // Inicializa tipo ativo no HUD
  setDrawTipo('BACKBONE');

  // Garante camadas
  if (!map.isStyleLoaded()){
    map.once("load", ()=>{ ensureDrawLayer(map); updateDrawLineAll(); });
  } else {
    ensureDrawLayer(map); updateDrawLineAll();
  }

  // bind click handler uma única vez
  if (!map.__ftthDrawRotaBound){
    map.__ftthDrawRotaBound = true;
    map.on("click", (e)=>{
      if (!__drawRota.active) return;
      const pt = { lng: e.lngLat.lng, lat: e.lngLat.lat };
      // Garante que existe segmento ativo
      if (!__drawRota.segments.length){
        __drawRota.segments.push({ tipo: __drawRota.currentTipo, points:[] });
      }
      const seg = currentSegment();
      if (seg.tipo !== __drawRota.currentTipo){
        __drawRota.segments.push({ tipo: __drawRota.currentTipo, points:[] });
      }
      currentSegment().points.push(pt);

      // Marcador visual com cor do tipo
      try{
        const style = DRAW_TIPO_STYLES[__drawRota.currentTipo] || DRAW_TIPO_STYLES.BACKBONE;
        const el = document.createElement("div");
        el.style.cssText = `width:10px;height:10px;border-radius:50%;background:${style.markerColor};border:2px solid rgba(255,255,255,0.9);box-shadow:0 2px 6px rgba(0,0,0,.4)`;
        const mk = new maplibregl.Marker({ element: el }).setLngLat(e.lngLat).addTo(map);
        __drawRota.markers.push(mk);
      }catch(_){}
      updateDrawLineAll();
    });
  }
}

function undoDrawRota(){
  if (!__drawRota.active) return;
  // Remove último ponto do último segmento com pontos
  for (let i = __drawRota.segments.length - 1; i >= 0; i--){
    if (__drawRota.segments[i].points.length > 0){
      __drawRota.segments[i].points.pop();
      if (__drawRota.segments[i].points.length === 0 && i > 0){
        __drawRota.segments.splice(i, 1);
      }
      break;
    }
  }
  // Remove último marcador
  try{
    const mk = __drawRota.markers.pop();
    if (mk) mk.remove();
  }catch(_){}
  updateDrawLineAll();
}

function cancelDrawRota(){
  const _m = window.map || (typeof map !== "undefined" ? map : null);
  __drawRota.active = false;
  __drawRota.segments = [];
  clearDrawMarkers();
  setRotaDrawButtons(false);
  setPickBanner(false);
  if (qs("pickBanner")) qs("pickBanner").textContent = "📍 Clique no mapa para capturar a posição…";
  if (_m && _m.getSource(__drawRota.sourceId)){
    try{ _m.getSource(__drawRota.sourceId).setData({ type:"FeatureCollection", features:[] }); }catch(_){}
  }
  try{ openAdminModal("rota"); }catch(_){}
}

function finishDrawRota(){
  if (!__drawRota.active) return;
  // Conta total de pontos
  const totalPts = __drawRota.segments.reduce((acc,s)=>acc+s.points.length,0);
  if (totalPts < 2){
    showPopup("Rota incompleta", "Adicione pelo menos 2 pontos no mapa.");
    return;
  }
  // Constrói FeatureCollection com uma Feature por segmento (tipo como propriedade)
  const features = __drawRota.segments
    .filter(seg => seg.points.length >= 2)
    .map(seg => ({
      type:"Feature",
      properties:{ tipo: seg.tipo },
      geometry:{ type:"LineString", coordinates: seg.points.map(p=>[p.lng,p.lat]) }
    }));
  if (!features.length){
    showPopup("Rota incompleta", "Cada segmento precisa ter pelo menos 2 pontos.");
    return;
  }
  const gj = { type:"FeatureCollection", features };
  if (qs("rota_geojson")) qs("rota_geojson").value = JSON.stringify(gj, null, 2);
  // Sincroniza __routeEdit para compatibilidade com buildRotaPayload
  try{
    if (!__routeEdit) __routeEdit = { active:false, points:[], markers:[], mode:'draw' };
    __routeEdit.points = features.flatMap(f => f.geometry.coordinates);
    __routeEdit.active = false;
  }catch(_){}

  __drawRota.active = false;
  clearDrawMarkers();
  setRotaDrawButtons(false);
  setPickBanner(false);
  if (qs("pickBanner")) qs("pickBanner").textContent = "📍 Clique no mapa para capturar a posição…";
  // Limpa camadas de preview
  const _m = window.map || (typeof map !== "undefined" ? map : null);
  if (_m && _m.getSource(__drawRota.sourceId)){
    try{ _m.getSource(__drawRota.sourceId).setData({ type:"FeatureCollection", features:[] }); }catch(_){}
  }
  // Reabre o modal na aba Rotas para o usuário confirmar e salvar
  try{ openAdminModal("rota"); }catch(_){}
}

    // Clique no switch visual

      e.preventDefault();
      chk.checked = !chk.checked;
      sw.classList.toggle("on", chk.checked);
      chk.dispatchEvent(new Event("change"));

      sw.classList.toggle("on", chk.checked);
      chk.dispatchEvent(new Event("change"));

async function authFetch(url, opts={}){
        const headers = authHeaders(opts.headers || {});
        const res = await fetch(url, { ...opts, headers });
        if (res.status === 401){
          // Lê o body para saber o motivo exato
          let errCode = "unauthorized";
          try {
            const clone = res.clone();
            const body  = await clone.json().catch(() => ({}));
            errCode = body?.error || "unauthorized";
          } catch(_) {}

          clearAuth();

          if (errCode === "session_displaced") {
            showLogin("Sessão expirada. Faça login novamente.");
          } else {
            showLogin("Sessão expirada. Faça login novamente.");
          }
        }
        return res;
      }

      async function fetchMeRole(){
  try{
    const res = await authFetch(`${window.WORKER_URL}/api/me`);
    if (!res.ok) return null;
    const data = await res.json().catch(()=>null);
    const role = String((data?.user?.role ?? data?.role ?? "user")).toLowerCase();
    localStorage.setItem(AUTH_ROLE_KEY, role);
    return role;
  }catch(_){ return null; }
}

async function doLogin(){
        const btn = document.getElementById("login-btn");
        const err = document.getElementById("login-error");
        const uEl = document.getElementById("login-user");
        const pEl = document.getElementById("login-pass");

        const user = (uEl?.value || "").trim();
        const password = (pEl?.value || "").trim();

        if (!user || !password){
          if (err) err.textContent = "Informe usuário e senha.";
          return;
        }

        if (btn) { btn.disabled = true; btn.textContent = "Entrando..."; }
        if (err) err.textContent = "";

        try{
          // ── Fingerprint do dispositivo (identifica sessão no servidor) ────────
          const _fpRaw = [
            navigator.userAgent || "",
            navigator.language  || "",
            String(screen.width  || 0) + "x" + String(screen.height || 0),
            Intl.DateTimeFormat().resolvedOptions().timeZone || "",
          ].join("|");
          // Hash simples (não criptográfico, só para identificar dispositivo)
          let _fpHash = 0;
          for (let i = 0; i < _fpRaw.length; i++) {
            _fpHash = (Math.imul(31, _fpHash) + _fpRaw.charCodeAt(i)) | 0;
          }
          const device_fingerprint = Math.abs(_fpHash).toString(16).padStart(8, "0");
          // Label legível: "Chrome • Windows • 1920x1080"
          const _ua = navigator.userAgent;
          const _browser = _ua.includes("Edg") ? "Edge"
            : _ua.includes("Chrome") ? "Chrome"
            : _ua.includes("Firefox") ? "Firefox"
            : _ua.includes("Safari") ? "Safari" : "Browser";
          const _os = _ua.includes("Win") ? "Windows"
            : _ua.includes("Android") ? "Android"
            : _ua.includes("iPhone") || _ua.includes("iPad") ? "iOS"
            : _ua.includes("Mac") ? "macOS"
            : _ua.includes("Linux") ? "Linux" : "Dispositivo";
          const device_label = `${_browser} • ${_os} • ${screen.width}x${screen.height}`;

          const res = await fetch(`${window.WORKER_URL}/api/login`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ user, password, device_fingerprint, device_label })
          });
          const data = await res.json().catch(()=> ({}));
          if (data?.error === "rate_limited") {
            const mins = data.retry_after ? Math.ceil(data.retry_after / 60) : "alguns";
            const msg  = data.kind === "user"
              ? `🔒 <b>Conta bloqueada temporariamente.</b><br>Muitas tentativas incorretas. Tente novamente em <b>${mins} minuto${mins !== 1 ? "s" : ""}</b>.`
              : `🚫 <b>Muitas tentativas.</b><br>Acesso bloqueado por ${mins} minuto${mins !== 1 ? "s" : ""}. Tente mais tarde.`;
            if (err) err.innerHTML = msg;
            // Desabilitar botão e mostrar countdown
            if (btn) {
              btn.disabled = true;
              let secs = data.retry_after || 60;
              const tick = setInterval(() => {
                secs--;
                if (secs <= 0) {
                  clearInterval(tick);
                  if (btn) { btn.disabled = false; btn.textContent = "Entrar"; }
                } else {
                  if (btn) btn.textContent = `Aguarde ${secs}s…`;
                }
              }, 1000);
            }
            return;
          }
          if (data?.error === "already_logged_in") {
            const device = data.device || "outro dispositivo";
            if (err) err.innerHTML =
              `⚠️ <b>Login bloqueado.</b><br>` +
              `Esta conta já está ativa em: <b>${device}</b>.<br>` +
              `Faça logout nesse dispositivo para continuar.`;
            return;
          }
          if (data && data.ok && data.token){
            const role_login       = String((data.user?.role      ?? data.role      ?? "user")).toLowerCase();
            const projeto_id_login = String((data.user?.projeto_id ?? data.projeto_id ?? "default"));
            const proj_nome_login  = String((data.user?.projeto_nome ?? ""));
            setAuth(data.token, (data.user?.username || user), role_login, projeto_id_login, proj_nome_login);
            localStorage.setItem("ftth_user", user);
            hideLogin();
            const el = document.getElementById('userName');
            if (el) el.textContent = user;
            if (!window.__APP_STARTED__){
              window.__APP_STARTED__ = true;
              fetchMeRole().then(()=>{
                const uL = getAuthUser() || localStorage.getItem('ftth_user') || '—';
                const elN = document.getElementById('userName');
                if (elN) elN.textContent = `${uL} (${getAuthRole()})`;
                applyPermissionsToUI();
              });
              initMap();
            }
            // limpa senha do campo
            if (pEl) pEl.value = "";
          } else {
            if (err) err.textContent = "Usuário ou senha inválidos.";
          }
        }catch(e){
          if (err) err.textContent = "Falha ao conectar. Verifique sua internet.";
        } finally{
          if (btn) { btn.disabled = false; btn.textContent = "Entrar"; }
        }
      }

      async function doLogout(){
  try{
    const token = getAuthToken();
    if (token){
      await fetch(`${window.WORKER_URL}/api/logout`, {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "authorization": "Bearer " + token
        }
      }).catch(()=>{});
    }
  } finally {
    clearAuth();
    // volta pro login e reinicia a página para limpar estado do mapa
    location.reload();
  }
}

      function unwrapArray(resp){
        if (Array.isArray(resp)) return resp;
        if (resp && Array.isArray(resp.items)) return resp.items;
        if (resp && Array.isArray(resp.data)) return resp.data;
        if (resp && resp.data && Array.isArray(resp.data.items)) return resp.data.items;
        return [];
      }

        const q = encodeURIComponent(label || "Destino");

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        const apple = `https://maps.apple.com/?daddr=${encodeURIComponent(ll)}&q=${q}`;
        const google = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(ll)}&destination_place_id=&travelmode=driving`;

        // Open best first; also show alternative in sheet
        window.open(isIOS ? apple : google, "_blank", "noopener");
      }

        return s.replace("T"," ").slice(0,16);
      }


      // Registro (offline-first): salva em localStorage (fila) e mostra export
      
      async function ensureSubmitKey() {
        const embedded = (window.SUBMIT_KEY || "").trim();
        if (embedded) return embedded;

        let k = localStorage.getItem("ftth_submit_key") || "";
        if (!k) {
          k = prompt("Chave de sincronização (SUBMIT_KEY):") || "";
          k = k.trim();
          if (k) localStorage.setItem("ftth_submit_key", k);
        }
        return k;
      }

      async function syncQueue(opts = {}) {
        const { silentIfEmpty = false, showPopups = false } = opts;
        if (IS_FILE_ORIGIN) {
          if (badge) badge.textContent = "⚠️ Sync desativado em arquivo local (abra via https)";
          if (showPopups) showPopup("Sync desativado", "Você está abrindo o app como arquivo local (file://). Para sincronizar sem erros de CORS, abra pelo endereço https do Pages.");
          return;
        }
        const q = getQueue();
        if (!q.length) {
          if (!silentIfEmpty) {
            if (badge) badge.textContent = "Sem pendências para sincronizar";
            if (showPopups) showPopup("Sem pendências", "Não há registros pendentes para sincronizar.");
          }
          return;
        }

        if (!navigator.onLine) {
          if (badge) badge.textContent = "🔴 Offline — pendências mantidas";
          if (showPopups) onBecameOffline();
          return;
        }

        // Separa adminOps de movimentações/log — nenhum precisa mais de SUBMIT_KEY
        const adminItems = q.filter(x => x.__adminOp);
        const submitItems = q.filter(x => !x.__adminOp);

        let sent = 0;
        let failed = 0;
        const nextQueue = [];

        if (badge) badge.textContent = `Sincronizando ${q.length}...`;

        for (let i = 0; i < q.length; i++) {
          const item = q[i];
          try {
            let res;
            if (item.__adminOp) {
              // Operações admin (CTO / CE / Rota) — vão direto ao endpoint correto
              const { path, method, payload } = item.__adminOp;
              res = await authFetch(`${window.WORKER_URL}${path}`, {
                method,
                headers: { "content-type": "application/json" },
                body: payload ? JSON.stringify(payload) : undefined
              });
            } else if (item.__movD1 || item.kind === "MOVIMENTACOES") {
              // Movimentações — vão direto ao D1
              res = await authFetch(`${window.WORKER_URL}/api/movimentacoes`, {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify(item.payload || item)
              });
            } else {
              // LOG_EVENTOS legado — tenta /api/submit se existir
              res = await authFetch(`${window.WORKER_URL}/api/movimentacoes`, {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify(item.payload || item)
              });
            }

            const txt = await res.text();
            let data = null;
            try { data = JSON.parse(txt); } catch { data = { raw: txt }; }

            if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
            sent++;
          } catch (err) {
            failed++;
            nextQueue.push({ ...item, last_error: String(err?.message ?? err), last_error_at: new Date().toISOString() });
          }
        }

        setQueue(nextQueue);

        if (failed === 0) {
          if (badge) badge.textContent = `✅ Sync OK • enviados: ${sent}`;
          if (showPopups) showPopup("Sincronizado", `${sent} registro(s) enviado(s) ao servidor com sucesso.`);
        } else {
          if (badge) badge.textContent = `⚠️ Sync parcial • enviados: ${sent} • falhas: ${failed}`;
          if (showPopups) showPopup("Sincronização parcial", `Enviados: ${sent}. Falharam: ${failed}. Os itens com falha continuam pendentes.`);
        }
        // Se algum adminOp foi enviado com sucesso, recarrega os dados do mapa
        if (sent > 0) {
          try{ refreshAllData(); }catch(_){}
        }
      }

function getQueue() {
        try { return JSON.parse(localStorage.getItem("ftth_queue") || "[]"); } catch { return []; }
      }
      function setQueue(q) {
        localStorage.setItem("ftth_queue", JSON.stringify(q));
      }

      function openPendentes() {
        const q = getQueue();
        const title = `Pendentes (${q.length})`;
        if (!q.length) {

          const kindLabel = it.kind === "ADMIN_ROTA" ? "🧵 ROTA"

          return `
            <div style="border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:10px;margin:8px 0;">
              <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">

                <div class="badge">${escapeHTML(ts)}</div>
              </div>
              ${err}
            </div>
          `;
        }).join("");

        openSheet(
          title,
          "Registros salvos no aparelho. Use 🔄 para sincronizar.",
          `
            <div class="btnRow">
              <button class="btn btnPrimary" id="btnSyncNow">🔄 Sincronizar agora</button>
              <button class="btn btnWarn" id="btnClearQ">🗑️ Limpar fila</button>
            </div>
            <div class="hint">Limpar fila apaga registros pendentes deste aparelho.</div>
            ${rows}
          `
        );

        const sn = document.getElementById("btnSyncNow");
        if (sn) sn.onclick = () => { closeSheet(); syncQueue({ silentIfEmpty: true, showPopups: true }); };

        const cq = document.getElementById("btnClearQ");
        if (cq) cq.onclick = () => {
          openSheet("Confirmar", "Apagar TODOS os pendentes deste aparelho?", `
            <div class="btnRow">

              <button class="btn" id="noClear">Cancelar</button>
            </div>
          `);
          document.getElementById("yesClear").onclick = () => { setQueue([]); closeSheet(); if (badge) badge.textContent = "Fila limpa"; };
          document.getElementById("noClear").onclick = closeSheet;
        };
      }

  function parseCSV(text) {
    // Detecta separador: ; ou ,
    const firstLine = text.split(/\r?\n/)[0] || "";
    const sep = (firstLine.split(";").length > firstLine.split(",").length) ? ";" : ",";

    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) return { headers: [], rows: [] };

    // Headers: normaliza para UPPERCASE sem espaços
    const headers = lines[0].split(sep).map(h =>
      h.trim().replace(/^["']|["']$/g,"").toUpperCase().replace(/\s+/g,"_")
    );

    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      // Divide respeitando aspas
      const vals = [];
      let cur = "", inQ = false;
      for (const ch of line + sep) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === sep && !inQ) { vals.push(cur.trim()); cur = ""; }
        else cur += ch;
      }
      const obj = {};
      headers.forEach((h, idx) => { obj[h] = (vals[idx] ?? "").replace(/^["']|["']$/g,"").trim(); });
      rows.push(obj);
    }
    return { headers, rows };
  }

        errs = d.errors||0;
        setBar(100);
        msg.style.color = ok > 0 ? "#86efac" : "#f87171";
        msg.textContent = ok > 0
          ? `✅ ${ok} rota(s) importada(s)${errs>0?` · ⚠️ ${errs} erro(s)`:""}.`
          : `❌ Nenhuma rota importada. ${errs} erro(s).`;
      }

      // ── Postes ────────────────────────────────────────────────────────────
      else if (_csvType === "POSTE") {
        lbl.textContent = `Importando ${_csvRows.length} Postes…`;
        const items = _csvRows.map(r => ({
          poste_id:     r.POSTE_ID || r.ID || "",
          nome:         r.NOME     || r.NAME || r.POSTE_ID || "",
          tipo:         (r.TIPO    || "simples").toLowerCase(),
          altura:       r.ALTURA   || "",
          material:     r.MATERIAL || "",
          proprietario: r.PROPRIETARIO || "",
          status:       (r.STATUS  || "ativo").toLowerCase(),
          lat:          parseFloat(r.LAT  || r.LATITUDE  || "0"),
          lng:          parseFloat(r.LNG  || r.LONGITUDE || r.LON || "0"),
          bairro:       r.BAIRRO   || "",
          rua:          r.RUA      || r.ENDERECO || "",
          obs:          r.OBS      || r.OBSERVACAO || "",
        })).filter(r => r.poste_id && isFinite(r.lat) && isFinite(r.lng) && r.lat !== 0);
        setBar(20);
        const res = await authFetch(`${window.WORKER_URL}/api/postes/import`, {
          method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ items })
        });
        const d = await res.json().catch(()=>({}));
        ok   = (d.inserted||0)+(d.updated||0);
        errs = d.errors||0;
        setBar(100);
        msg.style.color = ok > 0 ? "#86efac" : "#f87171";
        msg.textContent = ok > 0
          ? `✅ ${ok} poste(s) importado(s)${errs>0?` · ⚠️ ${errs} erro(s)`:""}.`
          : `❌ Nenhum poste importado. ${errs} erro(s).`;
      }

    } catch(err) {
      setBar(0);
      msg.style.color = "#f87171";
      msg.textContent = `❌ Erro: ${escapeHTML(String(err?.message||err))}`;
    }

    prog.style.display = "none";
    btn.disabled = false; btn.style.opacity = "1";
    btn.textContent = "✅ Concluído — Importar novamente";
    try { await refreshAllData(); } catch(_) {}
  };
}

      });
