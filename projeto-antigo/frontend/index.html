      if (data.deletedCtos   > 0) partes.push(`${data.deletedCtos} CTOs`);
      if (data.deletedCaixas > 0) partes.push(`${data.deletedCaixas} CE/CDOs`);
      if (data.deletedRotas  > 0) partes.push(`${data.deletedRotas} Rotas`);
      if (data.deletedPostes > 0) partes.push(`${data.deletedPostes} Postes`);

      msgEl.style.color = "#86efac";
      msgEl.textContent = partes.length
        ? `✅ Apagados: ${partes.join(", ")}.`
        : "✅ Nenhum item encontrado para apagar.";

      try { await refreshAllData(); } catch(_) {}
    } catch(e) {
      msgEl.style.color = "#f87171";
      msgEl.textContent = `❌ Erro: ${escapeHTML(String(e?.message || e))}`;
      btn.disabled = false; btn.textContent = "🗑️ Tentar novamente";
    }
  };
}

window.carregarRegistros = async function(status) {
  // Atualiza tab ativa
  ['pendente','aprovado','rejeitado'].forEach(s => {
    const btn = document.getElementById(`btnTab${s.charAt(0).toUpperCase()+s.slice(1)}`);
    if (!btn) return;
    const isActive = s === status;
    btn.style.background = isActive ? (s === 'pendente' ? 'rgba(251,191,36,.15)' : s === 'aprovado' ? 'rgba(34,197,94,.15)' : 'rgba(239,68,68,.15)') : 'rgba(255,255,255,.06)';
    btn.style.borderColor = isActive ? (s === 'pendente' ? 'rgba(251,191,36,.3)' : s === 'aprovado' ? 'rgba(34,197,94,.3)' : 'rgba(239,68,68,.3)') : 'rgba(255,255,255,.10)';
    btn.style.color = isActive ? (s === 'pendente' ? '#fcd34d' : s === 'aprovado' ? '#86efac' : '#fca5a5') : '#94a3b8';
  });

  const listEl = document.getElementById("registrosList");
  if (!listEl) return;
  listEl.innerHTML = `<div style="font-size:12px;color:#64748b;">Carregando...</div>`;

  try {
    const res  = await authFetch(`${window.WORKER_URL}/api/registros?status=${status}`);
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.items) {
      listEl.innerHTML = `<div style="color:#f87171;font-size:12px;">Erro: ${data.error||res.status}</div>`;
      return;
    }

    if (!data.items.length) {
      listEl.innerHTML = `<div style="font-size:13px;color:#64748b;padding:16px 0;text-align:center;">
        ${status === 'pendente' ? '🎉 Nenhum cadastro pendente' : 'Nenhum registro encontrado'}
      </div>`;
      return;
    }

    listEl.innerHTML = data.items.map(r => `
      <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
          <div>
            <div style="font-size:14px;font-weight:700;color:#e2e8f0;">${escapeHTML(r.empresa)}</div>
            <div style="font-size:11px;color:#64748b;margin-top:2px;">
              Login: <b style="color:#94a3b8;">${escapeHTML(r.admin_login)}</b>
              • Plano: <b style="color:${r.plano==='pro'?'#22c55e':'#64748b'};">${r.plano}</b>
            </div>
            ${r.email    ? `<div style="font-size:11px;color:#64748b;">📧 ${escapeHTML(r.email)}</div>` : ''}
            ${r.telefone ? `<div style="font-size:11px;color:#64748b;">📱 ${escapeHTML(r.telefone)}</div>` : ''}
            <div style="font-size:10px;color:#475569;margin-top:4px;">
              Solicitado em ${new Date(r.criado_em).toLocaleString('pt-BR')}
            </div>
          </div>
          <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;
            background:${r.status==='pendente'?'rgba(251,191,36,.12)':r.status==='aprovado'?'rgba(34,197,94,.12)':'rgba(239,68,68,.12)'};
            color:${r.status==='pendente'?'#fcd34d':r.status==='aprovado'?'#86efac':'#fca5a5'};">
            ${r.status}
          </span>
        </div>
        ${r.status === 'pendente' ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <button onclick="aprovarRegistro(${r.id},'${escapeHTML(r.empresa)}')"
            style="padding:9px;border-radius:10px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#86efac;font-weight:700;font-size:12px;cursor:pointer;">
            ✅ Aprovar
          </button>
          <button onclick="rejeitarRegistro(${r.id},'${escapeHTML(r.empresa)}')"
            style="padding:9px;border-radius:10px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5;font-weight:700;font-size:12px;cursor:pointer;">
            ✗ Rejeitar
          </button>
        </div>` : `
        <div style="font-size:11px;color:#475569;">
          ${r.status === 'aprovado' ? `✅ Aprovado por <b>${escapeHTML(r.aprovado_por||'—')}</b> em ${new Date(r.aprovado_em||r.criado_em).toLocaleString('pt-BR')}` : `✗ Rejeitado`}

      </div>
    `).join("");
  } catch(e) {
    if (listEl) listEl.innerHTML = `<div style="color:#f87171;font-size:12px;">Erro: ${escapeHTML(String(e?.message||e))}</div>`;
  }
};

window.aprovarRegistro = async function(id, empresa) {
  const btn = event.target;
  btn.disabled = true; btn.textContent = "Aprovando…";
  try {
    const res  = await authFetch(`${window.WORKER_URL}/api/registros/aprovar`, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ id })
    });
    const data = await res.json().catch(()=>({}));
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
    showPopup("✅ Aprovado!", `Assinante <b>${escapeHTML(empresa)}</b> ativado.<br>Login: <b>${escapeHTML(data.admin_login||'—')}</b>`);
    carregarRegistros('pendente');
    atualizarBadgeRegistros();
  } catch(e) {
    btn.disabled = false; btn.textContent = "✅ Aprovar";
    showPopup("Erro", String(e?.message||e));
  }
};

window.rejeitarRegistro = async function(id, empresa) {
  if (!confirm(`Rejeitar o cadastro de "${empresa}"?`)) return;
  try {
    const res  = await authFetch(`${window.WORKER_URL}/api/registros/rejeitar`, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ id })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    carregarRegistros('pendente');
    atualizarBadgeRegistros();
  } catch(e) { showPopup("Erro", String(e?.message||e)); }
};

async function atualizarBadgeRegistros() {
  if (!isSuperAdmin()) return;
  try {
    const res  = await authFetch(`${window.WORKER_URL}/api/registros?status=pendente`);
    const data = await res.json().catch(()=>({}));
    const total = data.items?.length || 0;
    const badge = document.getElementById("badgeRegistros");
    if (!badge) return;
    badge.textContent    = total;
    badge.style.display  = total > 0 ? "inline-flex" : "none";
  } catch(_) {}
}

    const msgEl  = document.getElementById("projetoFormMsg");
    const nome   = (document.getElementById("pf_nome")?.value || "").trim();
    const id     = (document.getElementById("pf_id")?.value   || "").trim();
    const plano  = document.getElementById("pf_plano")?.value || "basico";
    const adUser = (document.getElementById("pf_admin_user")?.value || "").trim();
    const adPass = (document.getElementById("pf_admin_pass")?.value || "").trim();

    if (!nome) { msgEl.style.color="#f87171"; msgEl.textContent="⚠️ Nome da empresa obrigatório."; return; }

    btn.disabled = true; btn.textContent = "Salvando…";
    msgEl.style.color = "#94a3b8"; msgEl.textContent = "";
    try {
      const res  = await authFetch(`${window.WORKER_URL}/api/projetos`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ projeto_id: id || undefined, nome, plano, ativo: true, admin_username: adUser||undefined, admin_password: adPass||undefined })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);

      msgEl.style.color = "#86efac";
      msgEl.textContent = `✅ ${data.action === "created" ? "Criado" : "Atualizado"}! ID: ${data.projeto_id}${data.admin_created ? " • Admin criado" : ""}`;
      setTimeout(() => { hideForm(); loadProjetos(); }, 1200);
    } catch(e) {
      msgEl.style.color = "#f87171";
      msgEl.textContent = `❌ ${escapeHTML(String(e?.message||e))}`;
    } finally {
      btn.disabled = false; btn.textContent = "💾 Salvar";
    }
  };

  // Expõe funções para botões inline
  window.pmEditProjeto = (id, nome, plano) => showForm(`✏️ Editar: ${nome}`, id, nome, plano);

  window.pmToggleProjeto = async (projeto_id, ativar) => {
    try {
      const res  = await authFetch(`${window.WORKER_URL}/api/projetos`, {
        method: "POST",
        headers: { "content-type":"application/json" },
        body: JSON.stringify({ projeto_id, nome: "_", ativo: ativar })
      });
      const data = await res.json().catch(()=>({}));
      if (!res.ok || data.error) throw new Error(data.error||`HTTP ${res.status}`);
      loadProjetos();
    } catch(e) { showPopup("Erro", String(e?.message||e)); }
  };

  window.pmDeleteProjeto = async (projeto_id, nome) => {
    openSheet("🗑️ Deletar assinante", `Deletar <b>${escapeHTML(nome)}</b>?`, `
      <div style="font-size:13px;color:#f87171;margin-bottom:16px;line-height:1.6;">
        ⚠️ Esta ação é irreversível. Todos os dados do assinante serão removidos permanentemente:<br>
        CTOs, rotas, caixas, usuários e movimentações.
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
        <input type="checkbox" id="confirmDeleteCheck" style="width:16px;height:16px;" />
        <label for="confirmDeleteCheck" style="font-size:13px;color:#e2e8f0;">Entendo que esta ação não pode ser desfeita</label>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <button id="btnConfirmDelete" disabled style="opacity:.4;padding:12px;border-radius:12px;background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#fca5a5;font-weight:700;font-size:13px;cursor:pointer;">
          🗑️ Deletar tudo
        </button>
        <button id="btnCancelDelete" style="padding:12px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);color:#e2e8f0;font-weight:700;font-size:13px;cursor:pointer;">
          Cancelar
        </button>
      </div>
    `);
    document.getElementById("btnCancelDelete").onclick = () => closeSheet();
    document.getElementById("confirmDeleteCheck").onchange = (e) => {
      const btn = document.getElementById("btnConfirmDelete");
      if (btn) { btn.disabled = !e.target.checked; btn.style.opacity = e.target.checked ? "1" : ".4"; }
    };
    document.getElementById("btnConfirmDelete").onclick = async () => {
      const btn = document.getElementById("btnConfirmDelete");
      btn.disabled = true; btn.textContent = "Deletando…";
      try {
        const res  = await authFetch(`${window.WORKER_URL}/api/projetos`, {
          method: "DELETE",
          headers: { "content-type":"application/json" },
          body: JSON.stringify({ projeto_id, force: true })
        });
        const data = await res.json().catch(()=>({}));
        if (!res.ok || data.error) throw new Error(data.error||`HTTP ${res.status}`);
        closeSheet();
        showPopup("✅ Deletado", `Assinante <b>${escapeHTML(nome)}</b> removido.`);
        // reabre lista após fechar popup
        setTimeout(() => openProjetoManager(), 600);
      } catch(e) {
        showPopup("Erro", String(e?.message||e));
      }
    };
  };

  loadProjetos();
}

async function carregarPostes() {
  const box = document.getElementById("posteListBox");
  if (!box) return;
  box.innerHTML = '<div style="font-size:11px;color:#64748b;padding:4px 0;">Carregando...</div>';
  try {
    const res  = await authFetch(`${window.WORKER_URL}/api/postes`);
    const data = await res.json().catch(()=>({}));
    const lista = (data.items || []).sort((a,b)=>(a.poste_id||"").localeCompare(b.poste_id||""));
    _postesCache = lista;
    if (!lista.length) {
      box.innerHTML = '<div style="font-size:12px;color:#64748b;padding:6px 0;text-align:center;">Nenhum poste cadastrado ainda.</div>';
      return;
    }
    // Compact ID-table (same visual style as CTO list in other places)
    box.innerHTML = `
      <div style="font-size:11px;color:#94a3b8;margin-bottom:6px;font-weight:700;">
        ${lista.length} poste(s) — clique para editar
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;">
        ${lista.map(p => {
          const t = POSTE_TIPOS[p.tipo] || POSTE_TIPOS.simples;
          const dot = p.status === "ativo" ? "#22c55e" : p.status === "manutencao" ? "#f59e0b" : "#ef4444";
          return `<div onclick="mostrarFormPoste('${escapeHTML(p.poste_id)}')"
            style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
                   border-radius:8px;background:rgba(255,255,255,.05);
                   border:1px solid ${t.color}55;border-left:3px solid ${t.color};
                   cursor:pointer;font-size:11px;font-weight:700;color:#e2e8f0;
                   transition:background .15s;" title="${escapeHTML(p.nome||p.poste_id)} · ${t.label}">
            <span style="width:6px;height:6px;border-radius:50%;background:${dot};flex-shrink:0;"></span>
            ${t.icon} ${escapeHTML(p.poste_id)}
          </div>`;
        }).join("")}
      </div>`;
  } catch(e) {
    box.innerHTML = `<div style="color:#f87171;font-size:11px;">${escapeHTML(String(e?.message||e))}</div>`;
  }
}

let _postesCache = [];
async function mostrarFormPoste(id) {
  const formBox = document.getElementById("posteFormBox");
  const title   = document.getElementById("postFormTitle");
  if (!formBox) return;

  // Se não tem cache ainda, busca
  if (!_postesCache.length) {
    try {
      const res = await authFetch(`${window.WORKER_URL}/api/postes`);
      const d   = await res.json().catch(()=>({}));
      _postesCache = d.items || [];
    } catch(_) {}
  }

  const p = id ? _postesCache.find(x => x.poste_id === id) : null;
  if (title) title.textContent = p ? `Editar: ${p.nome || p.poste_id}` : "Novo Poste";

  // Limpa ou preenche formulário
  const s = (eid, v) => { const el = document.getElementById(eid); if(el) el.value = v || ""; };
  s("poste_id",          p?.poste_id      || "");
  s("poste_nome",        p?.nome          || "");
  s("poste_tipo",        p?.tipo          || "simples");
  s("poste_altura",      p?.altura        || "");
  s("poste_material",    p?.material      || "");
  s("poste_proprietario",p?.proprietario  || "");
  s("poste_status",      p?.status        || "ativo");
  s("poste_rua",         p?.rua           || "");
  s("poste_bairro",      p?.bairro        || "");
  s("poste_lat",         p?.lat           || "");
  s("poste_lng",         p?.lng           || "");
  s("poste_obs",         p?.obs           || "");

  // Bloqueia edição do ID se editando existente
  const idInput = document.getElementById("poste_id");
  if (idInput) idInput.readOnly = !!p;

  // Atualiza título do separador
  const titleEl = document.getElementById("postFormTitle");
  if (titleEl) titleEl.textContent = p ? `Editando: ${p.nome || p.poste_id}` : "Novo Poste";

  // Form sempre visível — não esconde a lista
  formBox.style.display = "";

  // Scroll suave até o formulário
  try { formBox.scrollIntoView({ behavior: "smooth", block: "nearest" }); } catch(_) {}
}

function mostrarFormOLT(id) {
  const formBox = document.getElementById("oltFormBox");
  if (!formBox) return;
  const del = document.getElementById("btnOltDel");
  if (id) {
    const o = _oltsCache.find(x => String(x.id)===String(id));
    if (o) {
      document.getElementById("olt_id").value    = o.id || "";
      document.getElementById("olt_nome").value  = o.nome || "";
      document.getElementById("olt_modelo").value= o.modelo || "";
      document.getElementById("olt_ip").value    = o.ip || "";
      document.getElementById("olt_cap").value   = o.capacidade || 16;
      document.getElementById("olt_obs").value   = o.obs || "";
      const idInput = document.getElementById("olt_id");
      idInput.disabled = true;
      idInput.dataset.eid = o.id || "";  // salva ID para recuperar ao salvar
      // carrega lat/lng no hidden inputs
      const latEl = document.getElementById("olt_lat_hidden");
      const lngEl = document.getElementById("olt_lng_hidden");
      const badge = document.getElementById("olt_coords_badge");
      const badgeTxt = document.getElementById("olt_coords_text");
      if (latEl) latEl.value = (o.lat != null ? String(o.lat) : "");
      if (lngEl) lngEl.value = (o.lng != null ? String(o.lng) : "");
      if (badge && badgeTxt) {
        if (o.lat && o.lng) {
          badgeTxt.textContent = `Lat: ${Number(o.lat).toFixed(6)}, Lng: ${Number(o.lng).toFixed(6)}`;
          badge.style.display = "block";
        } else {
          badge.style.display = "none";
          badge.style.background = "rgba(239,68,68,.1)";
          badge.style.borderColor = "rgba(239,68,68,.25)";
          badge.style.color = "#fca5a5";
          badgeTxt.textContent = "⚠️ Sem posição no mapa — clique em Colocar no mapa";
          badge.style.display = "block";
        }
      }
    }
    if (del) del.style.display = "inline-flex";
  } else {
    ["olt_id","olt_nome","olt_modelo","olt_ip","olt_obs"].forEach(i=>{const el=document.getElementById(i);if(el)el.value="";});
    const cap = document.getElementById("olt_cap"); if(cap) cap.value=16;
    const idEl = document.getElementById("olt_id"); if(idEl) idEl.disabled=false;
    if (del) del.style.display = "none";
    // limpa lat/lng e badge
    const latEl2 = document.getElementById("olt_lat_hidden");
    const lngEl2 = document.getElementById("olt_lng_hidden");
    const badge2 = document.getElementById("olt_coords_badge");
    if (latEl2) latEl2.value = "";
    if (lngEl2) lngEl2.value = "";
    if (badge2) badge2.style.display = "none";
  }
  formBox.style.display = "block";
}

async function salvarOLT() {
  const idEl   = document.getElementById("olt_id");
  const id     = (idEl?.value||idEl?.dataset?.eid||"").trim();
  const nome   = (document.getElementById("olt_nome")?.value||"").trim();
  if (!nome) { showPopup("Erro","Nome é obrigatório."); return; }
  const payload = {
    action: "upsert",
    olt: {
      id: id || undefined,
      nome,
      modelo:     document.getElementById("olt_modelo")?.value||"",
      ip:         document.getElementById("olt_ip")?.value||"",
      capacidade: Number(document.getElementById("olt_cap")?.value)||16,
      obs:        document.getElementById("olt_obs")?.value||"",
      lat:        document.getElementById("olt_lat_hidden")?.value ? Number(document.getElementById("olt_lat_hidden").value) : null,
      lng:        document.getElementById("olt_lng_hidden")?.value ? Number(document.getElementById("olt_lng_hidden").value) : null,
    }
  };
  try {
    const res  = await authFetch(`${window.WORKER_URL}/api/olts`, {
      method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify(payload)
    });
    const data = await res.json().catch(()=>({}));
    if (!res.ok||data.error) throw new Error(data.error||`HTTP ${res.status}`);
    // fecha form e atualiza lista + mapa
    const formBox = document.getElementById("oltFormBox");
    if (formBox) formBox.style.display = "none";
    await carregarOLTs();
    if (window._reloadOltsLayer) await window._reloadOltsLayer();
    showPopup("✅ Salvo","OLT salva com sucesso!");
  } catch(e) { showPopup("Erro",String(e?.message||e)); }
}

async function deletarOLT() {
  const id = (document.getElementById("olt_id")?.value||"").trim();
  if (!id) return;
  if (!confirm(`Remover OLT "${id}"? As CE/CDOs vinculadas serão desvinculadas.`)) return;
  try {
    const res = await authFetch(`${window.WORKER_URL}/api/olts`,{
      method:"DELETE",headers:{"content-type":"application/json"},body:JSON.stringify({action:"delete",id})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const formBox2 = document.getElementById("oltFormBox");
    if (formBox2) formBox2.style.display = "none";
    await carregarOLTs();
    if (window._reloadOltsLayer) await window._reloadOltsLayer();
    showPopup("✅ Removida","OLT removida.");
  } catch(e) { showPopup("Erro",String(e?.message||e)); }
}

// ── openDiagramaOLT: vista profissional com matriz de portas PON ──────────────
async function openDiagramaOLT(oltId) {
  openSheet("📡 Topologia de Rede","Carregando...","");
  try {
    const [topoRes, oltsRes] = await Promise.all([
      authFetch(`${window.WORKER_URL}/api/topologia`),
      authFetch(`${window.WORKER_URL}/api/olts`)
    ]);
    const topo     = await topoRes.json();
    const oltsData = await oltsRes.json();
    const olt      = (oltsData.items||[]).find(o=>String(o.id)===String(oltId)) || {nome:oltId,capacidade:16};
    const node     = (topo.tree||[]).find(o=>String(o.id)===String(oltId));
    const cdos     = node?.cdos || [];
    const totalCtos = cdos.reduce((a,c)=>(a+(c.ctos||[]).length),0);

    document.getElementById("sheetSub").innerHTML =
      `🔌 <b>${escapeHTML(olt.nome)}</b> &nbsp;·&nbsp; ${escapeHTML(olt.modelo||'')} &nbsp;·&nbsp; ${cdos.length} CE/CDO &nbsp;·&nbsp; ${totalCtos} CTOs`;
    document.getElementById("sheetBody").innerHTML = renderDiagramaOLT(olt, cdos, topo);
  } catch(e) {
    document.getElementById("sheetSub").innerHTML = "";
    document.getElementById("sheetBody").innerHTML = `<div style="color:#f87171;">${escapeHTML(String(e?.message||e))}</div>`;
  }
}

      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <div style="background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);border-radius:10px;padding:8px 14px;text-align:center;">
          <div style="font-size:18px;font-weight:900;color:#4ade80;">${cdos.length}</div>
          <div style="font-size:10px;color:#64748b;margin-top:1px;">CE/CDO</div>
        </div>
        <div style="background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);border-radius:10px;padding:8px 14px;text-align:center;">
          <div style="font-size:18px;font-weight:900;color:#a5b4fc;">${totalCtos}</div>
          <div style="font-size:10px;color:#64748b;margin-top:1px;">CTOs</div>
        </div>
        <div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:8px 14px;text-align:center;">
          <div style="font-size:18px;font-weight:900;color:#fbbf24;">${cap > 0 ? Math.round(cdos.length/cap*100) : 0}%</div>
          <div style="font-size:10px;color:#64748b;margin-top:1px;">Uso PON</div>
        </div>
      </div>
    </div>
    <!-- Matriz de portas PON -->
    <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,.07);padding-top:14px;">
      <div style="font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;">Portas PON</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;">
        ${Array.from({length:cap},(_,i)=>{
          const porta = i+1;
          const cdo = cdos.find(c=>Number(c.porta_olt)===porta);
          const used = !!cdo;
          const ctCount = cdo ? (cdo.ctos||[]).length : 0;
          const pct2 = cdo && cdo.capacidade_total > 0 ? Math.round(cdo.clientes_ativos/cdo.capacidade_total*100) : 0;
          const col = used ? (pct2>=85?'#f87171':pct2>=60?'#fbbf24':'#4ade80') : 'rgba(255,255,255,.15)';
          const bg  = used ? (pct2>=85?'rgba(239,68,68,.18)':pct2>=60?'rgba(245,158,11,.15)':'rgba(34,197,94,.12)') : 'rgba(255,255,255,.04)';
          return `<div title="${used?`Porta ${porta}: ${escapeHTML(cdo.id||'')} (${ctCount} CTOs)`:(`Porta ${porta}: livre`)}"
            onclick="${used?`openDiagramaCDO('${escapeHTML(cdo.id||cdo.ID||'')}','inline')`:'void(0)'}"
            style="width:38px;height:38px;border-radius:8px;background:${bg};border:1.5px solid ${col};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:${used?'pointer':'default'};transition:all .15s;font-size:9px;color:${used?col:'rgba(255,255,255,.2)'};"
            onmouseover="this.style.transform='scale(1.12)'" onmouseout="this.style.transform=''">
            <span style="font-weight:700;font-size:10px;">${porta}</span>
            ${used?`<span style="font-size:8px;opacity:.8;">${ctCount}ct</span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;

  // ── Árvore CDO → CTO ──────────────────────────────────────────────────────
  if (!cdos.length) {
    html += `<div style="text-align:center;color:#64748b;font-size:13px;padding:24px;">Nenhuma CE/CDO vinculada.<br><small>Configure as CE/CDOs em Gerenciar → CE/CDO.</small></div>`;
    return html;
  }

  html += `<div style="display:flex;flex-direction:column;gap:10px;">`;
  cdos.forEach(cdo => {
    const ctos = cdo.ctos||[];
    html += `
    <div style="background:rgba(15,23,42,.7);border:1px solid rgba(99,102,241,.2);border-radius:14px;overflow:hidden;">
      <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(99,102,241,.08);cursor:pointer;"
        onclick="openDiagramaCDO('${escapeHTML(cdo.id||cdo.ID||'')}','inline')">
        <div style="width:36px;height:36px;border-radius:10px;background:rgba(99,102,241,.2);border:1px solid rgba(99,102,241,.35);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">📦</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:13px;color:#a5b4fc;">${escapeHTML(cdo.tipo||'CE')} ${escapeHTML(cdo.id||'')}</div>
          <div style="font-size:11px;color:#64748b;margin-top:1px;">
            ${cdo.porta_olt!=null?`PON porta <b style="color:#93c5fd;">${cdo.porta_olt}</b> &nbsp;·&nbsp; `:''}
            ${cdo.rua?escapeHTML(cdo.rua)+' &nbsp;·&nbsp; ':''}
            ${ctos.length} CTO(s)
            ${cdo.splitter_cdo?` &nbsp;·&nbsp; ${escapeHTML(cdo.splitter_cdo)}`:''}
          </div>
        </div>
        <div style="font-size:11px;color:#475569;flex-shrink:0;">▶ Diagrama</div>
      </div>
      ${ctos.length ? `<div style="display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;">
        ${ctos.map(ct=>`
          <div onclick="openDiagramaCTO('${escapeHTML(ct.cto_id||'')}','inline')"
            style="cursor:pointer;background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:6px 10px;min-width:80px;text-align:center;transition:all .15s;"
            onmouseover="this.style.background='rgba(34,197,94,.15)'" onmouseout="this.style.background='rgba(34,197,94,.07)'">
            <div style="font-size:11px;font-weight:700;color:#4ade80;">${escapeHTML(ct.cto_id||'')}</div>
            ${ct.porta_cdo!=null?`<div style="font-size:9px;color:#475569;">P${ct.porta_cdo}</div>`:''}
          </div>`).join('')}
      </div>` : `<div style="padding:8px 14px;font-size:11px;color:#475569;">Nenhuma CTO vinculada</div>`}
    </div>`;
  });
  html += `</div>`;
  return html;
}
